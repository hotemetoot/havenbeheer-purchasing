<svg width="900" height="760" viewBox="0 0 900 760" role="img" xmlns="http://www.w3.org/2000/svg">
<title>The domain model — what the system tracks and how it connects</title>
<desc>People and departments, the Purchase Request, the Purchase Order and its lines, and suppliers. A user belongs to a department. A purchase request is submitted by a user for a department, may suggest a supplier, and becomes exactly one purchase order. The purchase order is ordered from a supplier, ships to a delivery address, and contains one or more lines; each line records an item, quantity, unit price, unit of measure and received quantity.</desc>
<defs>
  <marker id="arrow" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6" fill="none" stroke="#7c7b75" stroke-width="1.5"/>
  </marker>
</defs>
<style>
  text { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .th   { font-size: 14px; font-weight: 500; }
  .ts   { font-size: 12px; font-weight: 400; }
  .tt   { font-size: 16px; font-weight: 700; }
  .prim { fill: #2C2C2A; }
  .sec  { fill: #5F5E5A; }
  .rel  { font-size: 11px; font-weight: 500; fill: #5F5E5A; }
  .conn { stroke: #7c7b75; stroke-width: 1.6; fill: none; }
</style>

<rect x="0" y="0" width="900" height="760" fill="#FFFFFF"/>
<text class="tt prim" x="40" y="36">What the system keeps track of — and how it all connects</text>
<text class="ts sec" x="40" y="58">Each box is one kind of record. The lines show how they relate. The two coloured records each have their own status flow.</text>

<!-- ============ relationship lines (under boxes) ============ -->
<path class="conn" d="M145,198 V232" marker-end="url(#arrow)"/>
<text class="rel" x="152" y="222">belongs to</text>

<path class="conn" d="M250,128 H356" marker-end="url(#arrow)"/>
<text class="rel" x="268" y="120">submitted by</text>

<path class="conn" d="M250,284 C310,284 320,158 356,158" marker-end="url(#arrow)"/>
<text class="rel" x="276" y="228">for department</text>

<path class="conn" stroke-dasharray="5 4" d="M250,408 C320,408 320,238 356,238" marker-end="url(#arrow)"/>
<text class="rel" x="258" y="350">suggested (optional)</text>

<path class="conn" d="M485,296 V332" marker-end="url(#arrow)"/>
<text class="rel" x="495" y="320">becomes · 1 to 1</text>

<path class="conn" d="M250,466 C320,466 320,400 356,400" marker-end="url(#arrow)"/>
<text class="rel" x="258" y="452">ordered from</text>

<path class="conn" d="M610,438 H686" marker-end="url(#arrow)"/>
<text class="rel" x="620" y="430">ship to</text>

<path class="conn" d="M485,548 V580" marker-end="url(#arrow)"/>
<text class="rel" x="495" y="570">contains · 1 to many</text>

<!-- ============ User ============ -->
<rect x="40" y="80" width="210" height="118" rx="10" fill="#E4F3F0" stroke="#0F766E"/>
<path d="M50,80 H240 Q250,80 250,90 V110 H40 V90 Q40,80 50,80 Z" fill="#0F766E"/>
<text class="th" x="52" y="100" fill="#FFFFFF" font-weight="700">User</text>
<text class="ts sec" x="52" y="130">• Name</text>
<text class="ts sec" x="52" y="150">• Email</text>
<text class="ts sec" x="52" y="170">• Department</text>
<text class="ts sec" x="52" y="190">• Role (what they may do)</text>

<!-- ============ Department ============ -->
<rect x="40" y="236" width="210" height="104" rx="10" fill="#E4F3F0" stroke="#0F766E"/>
<path d="M50,236 H240 Q250,236 250,246 V266 H40 V246 Q40,236 50,236 Z" fill="#0F766E"/>
<text class="th" x="52" y="256" fill="#FFFFFF" font-weight="700">Department</text>
<text class="ts sec" x="52" y="286">• Name</text>
<text class="ts sec" x="52" y="306">• Main approver</text>
<text class="ts sec" x="52" y="324">  (the head — a User)</text>

<!-- ============ Supplier ============ -->
<rect x="40" y="384" width="210" height="176" rx="10" fill="#FAEEDA" stroke="#854F0B"/>
<path d="M50,384 H240 Q250,384 250,394 V414 H40 V394 Q40,384 50,384 Z" fill="#854F0B"/>
<text class="th" x="52" y="404" fill="#FFFFFF" font-weight="700">Supplier</text>
<text class="ts sec" x="52" y="434">• Name</text>
<text class="ts sec" x="52" y="454">• Email &amp; phone</text>
<text class="ts sec" x="52" y="474">• Default currency</text>
<text class="ts sec" x="52" y="494">• Payment terms</text>
<text class="ts sec" x="52" y="514">• Rating</text>
<text class="ts sec" x="52" y="534">• Status (active / blocked)</text>

<!-- ============ Purchase Request ============ -->
<rect x="360" y="80" width="250" height="216" rx="10" fill="#E6F1FB" stroke="#185FA5"/>
<path d="M370,80 H600 Q610,80 610,90 V116 H360 V90 Q360,80 370,80 Z" fill="#185FA5"/>
<text class="th" x="373" y="100" fill="#FFFFFF" font-weight="700" font-size="15">Purchase Request (PR)</text>
<text class="ts" x="373" y="112" fill="#FFFFFF" fill-opacity="0.9">Its job: get approval to buy</text>
<text class="ts sec" x="373" y="140">• PR number — e.g. PR-26-0001</text>
<text class="ts sec" x="373" y="160">• Title &amp; description</text>
<text class="ts sec" x="373" y="180">• Justification (business case)</text>
<text class="ts sec" x="373" y="200">• Amount · currency · FX rate</text>
<text class="ts sec" x="373" y="220">• Quotation document attached</text>
<text class="ts sec" x="373" y="240">• Suggested supplier (optional)</text>
<line x1="373" y1="256" x2="597" y2="256" stroke="#378ADD" stroke-width="1"/>
<text class="rel" x="373" y="276" fill="#0C447C">▸ Status — has its own flow ↗</text>

<!-- ============ Purchase Order ============ -->
<rect x="360" y="336" width="250" height="212" rx="10" fill="#EEEDFE" stroke="#534AB7"/>
<path d="M370,336 H600 Q610,336 610,346 V372 H360 V346 Q360,336 370,336 Z" fill="#534AB7"/>
<text class="th" x="373" y="356" fill="#FFFFFF" font-weight="700" font-size="15">Purchase Order (PO)</text>
<text class="ts" x="373" y="368" fill="#FFFFFF" fill-opacity="0.9">Its job: order, receive and pay</text>
<text class="ts sec" x="373" y="396">• PO number — e.g. PO-26-0001</text>
<text class="ts sec" x="373" y="416">• Currency · FX · totals</text>
<text class="ts sec" x="373" y="436">• Delivery address</text>
<text class="ts sec" x="373" y="456">• Invoice attached</text>
<text class="ts sec" x="373" y="476">• Payment status</text>
<line x1="373" y1="492" x2="597" y2="492" stroke="#7F77DD" stroke-width="1"/>
<text class="rel" x="373" y="512" fill="#3C3489">▸ Status — has its own flow ↗</text>
<text class="ts sec" x="373" y="532">Run by Procurement</text>

<!-- ============ PO Line ============ -->
<rect x="360" y="584" width="250" height="160" rx="10" fill="#EEEDFE" stroke="#534AB7"/>
<path d="M370,584 H600 Q610,584 610,594 V614 H360 V594 Q360,584 370,584 Z" fill="#534AB7"/>
<text class="th" x="373" y="604" fill="#FFFFFF" font-weight="700">PO Line — one item ordered</text>
<text class="ts sec" x="373" y="632">• Item / description</text>
<text class="ts sec" x="373" y="652">• Quantity · unit price</text>
<text class="ts sec" x="373" y="672">• Unit of measure (each, box…)</text>
<text class="ts sec" x="373" y="692">• Line total (auto)</text>
<text class="ts sec" x="373" y="712">• Received quantity</text>
<text class="ts sec" x="373" y="732">• Line status</text>

<!-- ============ Delivery Address ============ -->
<rect x="690" y="388" width="180" height="104" rx="10" fill="#F7F6F1" stroke="#A9A79D"/>
<path d="M700,388 H860 Q870,388 870,398 V416 H690 V398 Q690,388 700,388 Z" fill="#8A887E"/>
<text class="th" x="702" y="408" fill="#FFFFFF" font-weight="700">Delivery Address</text>
<text class="ts sec" x="702" y="438">• Name</text>
<text class="ts sec" x="702" y="458">• Address</text>
<text class="ts sec" x="702" y="478">• Default?</text>

<!-- legend -->
<rect x="40" y="610" width="14" height="14" rx="3" fill="#E4F3F0" stroke="#0F766E"/>
<text class="ts sec" x="60" y="621">People</text>
<rect x="40" y="634" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#185FA5"/>
<text class="ts sec" x="60" y="645">Request</text>
<rect x="40" y="658" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7"/>
<text class="ts sec" x="60" y="669">Order</text>
<rect x="160" y="610" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B"/>
<text class="ts sec" x="180" y="621">Supplier</text>
<rect x="160" y="634" width="14" height="14" rx="3" fill="#F7F6F1" stroke="#A9A79D"/>
<text class="ts sec" x="180" y="645">Lookup list</text>
</svg>
