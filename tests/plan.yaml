      # approved) -> boundary (1000 + 4000 = exactly 5000; the live check is
      # strict `>`, so exactly-on-budget still approves) -> over (1000 +
      # 4000 + 9500 = 14500 > 5000, auto-rejected by the D53 backstop).
      # fx_rate_to_usd: 1 keeps quoted_total_usd == quoted_total. Terminal
      # PRs delete cleanly in teardown since D71 (Guard A exempts admin).
      - id_ref: pr_proj_within
        as: operations_a
        after_approvals: true
        trigger_workflow: cv237r8h7k9
        values: { title: "[TEST] project PR within budget", quoted_total: 1000, fx_rate_to_usd: 1, project: "@ref:proj_approved" }
      - id_ref: pr_proj_boundary
        as: operations_a
        after_approvals: true
        trigger_workflow: cv237r8h7k9
        values: { title: "[TEST] project PR exactly on budget", quoted_total: 4000, fx_rate_to_usd: 1, project: "@ref:proj_approved" }
      - id_ref: pr_proj_over
        as: operations_a
        after_approvals: true
        trigger_workflow: cv237r8h7k9
        values: { title: "[TEST] project PR over budget", quoted_total: 9500, fx_rate_to_usd: 1, project: "@ref:proj_approved" }

    # --- projects fixtures (R25-R30). status defaults to draft (field
    # defaultValue, verified live 2026-07-04); operations' create whitelist
    # has no status field, so none is sent. Budgets stay under the ladder's
    # $15k board threshold to keep chains at 3 steps (dept -> procurement ->
    # director). The immutability guard (2h75zryz3cb) exempts admin, so
    # teardown deletes ALL project fixtures cleanly; approvals rows
    # cascade-delete with the project (D63).
    projects:
      # proj_draft: plain create, stays draft. Used by R26 (draft edits +
      # destroy-deny), R27 (complete-draft deny), R28 (link-deny).
      - id_ref: proj_draft
        as: operations_a
        values: { title: "[TEST] draft project", budget_usd: 5000, justification: "[TEST] R26 draft fixture" }
      # proj_pending: enters the ladder and is deliberately left at the dept
      # stage (submitter operations_proj -> assignee Pat, never approved).
      # Gives R26 its mid-flow lock target. The zero-step approvals entry
      # below pins the precondition (status pending_dept_approval).
      - id_ref: proj_pending
        as: operations_proj
        trigger_workflow: hzykothf9cx   # Project Approval workflow key
        values: { title: "[TEST] mid-flow project", budget_usd: 5000, justification: "[TEST] R26 mid-flow fixture" }
      # proj_approved: full ladder to approved. The drawdown target for
      # R28/R29/R30's PRs, then R27's complete-allow target (case order:
      # the R28 link-allow case MUST run before the R27 complete-allow case).
      - id_ref: proj_approved
        as: operations_proj
        trigger_workflow: hzykothf9cx
        values: { title: "[TEST] approved project", budget_usd: 5000, justification: "[TEST] drawdown fixture" }
      # proj_approved_2: full ladder to approved, then fixtures.actions
      # completes it AS ADMIN before any case runs -> the stable `completed`
      # project for R26 (completed-update deny), R27 (re-complete deny), R28
      # (link-to-completed deny).
      - id_ref: proj_approved_2
        as: operations_proj
        trigger_workflow: hzykothf9cx
        values: { title: "[TEST] completed project", budget_usd: 5000, justification: "[TEST] completed fixture" }
      # proj_rejected: enters the ladder, dept stage REJECTS -> status
      # rejected. R26's rejected-locked deny target (D66: rejected is fully
      # locked — outside the owner-edit scope AND in the guard's locked list).
      - id_ref: proj_rejected
        as: operations_proj
        trigger_workflow: hzykothf9cx
        values: { title: "[TEST] rejected project", budget_usd: 5000, justification: "[TEST] R26 rejected fixture" }
      # proj_purchasing: enters the ladder, ONE dept approve -> stalled at
      # pending_purchasing_review. R26's guard-isolation target: procurement's
      # stage-scoped update grant passes ACL here, so a deny can only come
      # from the guard's pending clause (see the case comment).
      - id_ref: proj_purchasing
        as: operations_proj
        trigger_workflow: hzykothf9cx
        values: { title: "[TEST] purchasing-stage project", budget_usd: 5000, justification: "[TEST] R26 guard-isolation fixture" }

    # Reference data for the Issue PO guard: it requires supplierId and
    # deliveryAddressId to be set. Created as admin (plain reference records,
    # no guards on these collections, not the rule under test). Deletable at
    # teardown; the leftover issued PO (undeletable line, see below) keeps
    # dangling FKs afterward — harmless [TEST] debris, same policy as
    # po_closed.
    suppliers:
      - id_ref: sup_r22
        values: { name: "[TEST] R22 supplier" }
    delivery_addresses:
      - id_ref: addr_r22
        values: { name: "[TEST] R22 delivery address" }

    # po_draft: reusable non-terminal (draft) PO for R17/R20/R21 cases.
    # po_closed: a draft PO that fixtures.actions then drives to `closed` (a
    # terminal PO) for R18 + R21's delete-deny. Both after_approvals so the
    # runner creates them in the POST-approval pass — the create-guard
    # requires the source PR already `approved`.
    #
    # All four POs below are created as ADMIN since 2026-07-18 (D87) — see
    # the po_issued note for why. Only po_issued actually broke, but leaving
    # the others on procurement would mean their `currency`/`total` values
    # are silently dropped at create while the YAML still claims to set them.
    # Nothing asserts those two values today, so this is honesty rather than
    # a fix. Procurement's ability to create a PO at all is still covered as
    # a real runtime case by R15 (and its deny counterpart R16).
    purchase_orders:
      - id_ref: po_draft
        as: admin
        after_approvals: true
        values: { purchase_request: "@ref:pr_approved_2", currency: USD, total: 100 }
      - id_ref: po_closed
        as: admin
        after_approvals: true
        values: { purchase_request: "@ref:pr_approved_3", currency: USD, total: 100 }
      # po_issued: seeded complete (supplier + delivery address + currency +
      # total) so the Issue PO guard passes; fixtures.actions below then
      # drives it draft -> issued.
      #
      # Created as ADMIN, not procurement — changed 2026-07-18 (D87). Chunk
      # 019 removed supplier/currency/fx_rate_to_usd/total/issued_at from
      # procurement's purchase_orders CREATE whitelist, so a procurement
      # create silently drops three of the four values this fixture needs and
      # Issue PO then rejects the PO for having no supplier, currency or
      # total. That rejection is the product working correctly; only the
      # fixture was wrong. Admin bypasses field whitelists, which is also a
      # fair simulation of the real path — POs are created by the Generate PO
      # workflow, and workflow nodes bypass ACL the same way.
      # (The superseded comment here claimed these fields were in
      # procurement's create whitelist, "confirmed live 2026-07-03". True
      # then, false since 019.)
      - id_ref: po_issued
        as: admin
        after_approvals: true
        values: { purchase_request: "@ref:pr_approved_4", supplier: "@ref:sup_r22", delivery_address: "@ref:addr_r22", currency: USD, total: 100 }
      # po_r42: R42's OWN purchase order. Deliberately not po_draft — R21's
      # cases add and update lines on po_draft, so its lines_total is not
      # stable across a run and an exact-value assertion there would be
      # order-dependent. Stays draft for the whole run (line create, update
      # and delete all require a draft PO).
      - id_ref: po_r42
        as: admin
        after_approvals: true
        values: { purchase_request: "@ref:pr_approved_5", currency: USD, total: 500 }

    # Lines are created while the parent PO is still draft (line create on a
    # terminal PO is blocked by "Guard: PO Line Create — block on terminal
    # PO"), so po_closed's line must be seeded BEFORE fixtures.actions closes
    # it. line_total 50 < the PR's quoted_total 100 clears the budget guard.
    po_lines:
      - id_ref: po_draft_line
        as: procurement_a
        after_approvals: true
        values: { purchase_order: "@ref:po_draft", quantity_ordered: 2, unit_price: 25 }
      - id_ref: po_closed_line
        as: procurement_a
        after_approvals: true
        values: { purchase_order: "@ref:po_closed", quantity_ordered: 2, unit_price: 25 }
      # po_issued_line: seeded while the PO is still draft (line create on a
      # non-draft PO is guard-blocked). Priced (Issue guard rejects any
      # unpriced line) and 50 <= the PR's 100 (budget ceiling).
      - id_ref: po_issued_line
        as: procurement_a
        after_approvals: true
        values: { purchase_order: "@ref:po_issued", quantity_ordered: 2, unit_price: 25 }
      # po_r42_line: the single line R42's cases drive. 2 x 25 = 50 at
      # creation; the cases then take it to 150 (quantity), 300 (price),
      # then delete it (0). Sole line on po_r42, so the PO's lines_total
      # equals this line's line_total at every step.
      - id_ref: po_r42_line
        as: procurement_a
        after_approvals: true
        values: { purchase_order: "@ref:po_r42", quantity_ordered: 2, unit_price: 25 }

  # Drives fixture PRs through the REAL PR Approval workflow. Real personas
  # required: approvalRecords:submit checks the actual assigned userId, not
  # just role membership. Assignees resolve from departments.main_approver
  # (D40): Procurement -> pat.procurement (id 11), Director -> dana.director
  # (id 12). Chain for a simple PR (no project, is_regular false, small
  # total) verified live against the enabled PR Approval workflow
  # (id 372610390622208): Procurement Approval -> "Director required?"
  # (is_regular != true) -> pending_director_approval -> Director Approval
  # -> "Board required?" false (< $15k) -> approved.
  approvals:
    # pr_draft_a: created into the flow (skips dept — test users carry no
    # department), lands at the procurement stage; procurement RETURNS it for
    # info. The Procurement Approval node's return branch (branchIndex 1) is
    # wired to "Procurement Returned → Info Requested", which sets
    # status=info_requested (verified live 2026-07-04). A plain return needs no
    # returnToNodeKey (node returnTo=null). This is the only way to reach the
    # one operations-editable status after D68 — operations cannot write status.
    - target: pr_draft_a
      steps:
        - as: pat_procurement
          decision: return
          comment: "[TEST] procurement returns for info -> info_requested"
      assert:
        - collection: purchase_requests
          id_ref: pr_draft_a
          match: { status: info_requested }
      timeout_s: 30
    # pr_pending_director: one step only (Procurement), lands at
    # pending_director_approval - the precondition for R12.
    - target: pr_pending_director
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve, advance to director stage"
      assert:
        - collection: purchase_requests
          id_ref: pr_pending_director
          match: { status: pending_director_approval }
      timeout_s: 30
    # pr_approved: full chain (Procurement + Director) to status: approved -
    # the precondition for R15 (procurement creates a PO from an approved PR).
    - target: pr_approved
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> director stage"
        - as: dana_director
          decision: approve
          comment: "[TEST] director approve -> approved"
      assert:
        - collection: purchase_requests
          id_ref: pr_approved
          match: { status: approved }
      timeout_s: 30
    # pr_approved_2: same full chain, source PR for the po_draft fixture.
    - target: pr_approved_2
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> director stage"
        - as: dana_director
          decision: approve
          comment: "[TEST] director approve -> approved"
      assert:
        - collection: purchase_requests
          id_ref: pr_approved_2
          match: { status: approved }
      timeout_s: 30
    # pr_approved_3: same full chain, source PR for the po_closed fixture.
    - target: pr_approved_3
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> director stage"
        - as: dana_director
          decision: approve
          comment: "[TEST] director approve -> approved"
      assert:
        - collection: purchase_requests
          id_ref: pr_approved_3
          match: { status: approved }
      timeout_s: 30
    # pr_approved_4: same full chain, source PR for the po_issued fixture.
    - target: pr_approved_4
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> director stage"
        - as: dana_director
          decision: approve
          comment: "[TEST] director approve -> approved"
      assert:
        - collection: purchase_requests
          id_ref: pr_approved_4
          match: { status: approved }
      timeout_s: 30
    # pr_approved_5: same full chain, source PR for R42's po_r42 fixture.
    # 500 is under the 15000 board threshold, so the chain is the same two
    # steps (procurement -> director) as the others.
    - target: pr_approved_5
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> director stage"
        - as: dana_director
          decision: approve
          comment: "[TEST] director approve -> approved"
      assert:
        - collection: purchase_requests
          id_ref: pr_approved_5
          match: { status: approved }
      timeout_s: 30

    # --- R31-R38 branch chains (2026-07-05). No asserts here — each
    # outcome is a rule-cited state case, so a failure classifies per rule
    # (same pattern as the drawdown chains). pr_dept_pending and
    # pr_head_skip need no entry at all: their state cases poll directly.
    # pr_dept_flow: Pat approves the DEPT stage (he is operations_proj's
    # dept main approver) — one step, lands at purchasing review.
    - target: pr_dept_flow
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] dept head approve -> purchasing review"
      timeout_s: 30
    # pr_custom: Pat approves as the CUSTOM approver (the only pending task
    # on this PR after create).
    - target: pr_custom
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] custom approver approve -> purchasing review"
      timeout_s: 30
    # pr_regular_small: regular + 250 -> procurement approve is final.
    - target: pr_regular_small
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve, regular under 300 -> approved"
      timeout_s: 30
    # pr_regular_300: regular + exactly 300 -> director still required.
    - target: pr_regular_300
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve, regular at 300 -> director"
      timeout_s: 30
    # pr_board: 15000 -> board after director; Pat holds the board task.
    - target: pr_board
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> director stage"
        - as: dana_director
          decision: approve
          comment: "[TEST] director approve, 15000 -> board stage"
        - as: pat_procurement
          decision: approve
          comment: "[TEST] board approve -> approved"
      timeout_s: 30
    # pr_return_dir: director returns for info. The Director Approval node
    # is configured returnTo: 1 — the approver MUST pick a target node
    # (plain return 400s "returnToNodeKey is required"; probed live
    # 2026-07-05). Returning to the Procurement Approval node (ec2h8cqal32)
    # sets status info_requested AND re-opens Pat's procurement task — the
    # flow rewinds to that stage. Dana's UI will ask the same question.
    - target: pr_return_dir
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> director stage"
        - as: dana_director
          decision: return
          comment: "[TEST] director returns for info -> info_requested"
          returnToNodeKey: ec2h8cqal32
      timeout_s: 30
    # pr_reject_proc: procurement rejects outright.
    - target: pr_reject_proc
      steps:
        - as: pat_procurement
          decision: reject
          comment: "[TEST] procurement rejects — not needed"
      timeout_s: 30

    # --- projects approval chains (R25-R30 preconditions). Ladder audited
    # node-by-node 2026-07-03: dept stage (assignee = submitter's
    # mainDepartment.mainApproverId = Pat via operations_proj) ->
    # Procurement Approval (Pat) -> Director Approval (Dana); board stage
    # skipped (budget 5000 < 15000). The guard 2h75zryz3cb is active
    # throughout — these chains PASSING is the approval-path pass-through
    # proof for R26 (approval writes bypass request-interception, D63).
    # departmentId assert: the first ladder node writes it from the
    # submitter's main department — resolves 363554444476416 for
    # operations_proj under BOTH the current revision and the pending
    # Rule C revision (373589018214400), so this does not block on the
    # revision swap.
    # proj_pending: zero steps — the entry only pins the precondition
    # (stalled at the dept stage) that R26's mid-flow deny case relies on.
    - target: proj_pending
      steps: []
      assert:
        - collection: projects
          id_ref: proj_pending
          match: { status: pending_dept_approval }
      timeout_s: 30
    - target: proj_approved
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] dept stage approve"
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement stage approve"
        - as: dana_director
          decision: approve
          comment: "[TEST] director stage approve -> approved"
      assert:
        - collection: projects
          id_ref: proj_approved
          match: { status: approved, departmentId: 363554444476416 }
      timeout_s: 30
    - target: proj_approved_2
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] dept stage approve"
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement stage approve"
        - as: dana_director
          decision: approve
          comment: "[TEST] director stage approve -> approved"
      assert:
        - collection: projects
          id_ref: proj_approved_2
          match: { status: approved }
      timeout_s: 30
    # proj_rejected: ONE dept-stage reject ends the ladder -> rejected.
    - target: proj_rejected
      steps:
        - as: pat_procurement
          decision: reject
          comment: "[TEST] dept stage reject -> rejected"
      assert:
        - collection: projects
          id_ref: proj_rejected
          match: { status: rejected }
      timeout_s: 30
    # proj_purchasing: ONE dept-stage approve -> stalled at purchasing review.
    - target: proj_purchasing
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] dept stage approve -> purchasing review"
      assert:
        - collection: projects
          id_ref: proj_purchasing
          match: { status: pending_purchasing_review }
      timeout_s: 30
    # --- drawdown PR chains: after_records -> run in the SECOND approvals
    # pass, after the after_approvals records above exist. ONE procurement
    # step each — for a project-linked PR the drawdown branch replaces the
    # director/board routing entirely (D49/D53): within-budget -> approved,
    # over-budget -> auto-rejected. Outcome asserts live in the R29/R30
    # `state` cases, where a failure is classified per rule.
    - target: pr_proj_within
      after_records: true
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> drawdown, within budget"
      # D78 first-approval regression (R29): committed must be right
      # IMMEDIATELY after this first drawdown approval — 1000, with
      # remaining_usd already recomputed (5000 - 1000). Under the pre-D78
      # bug this read 0 here (the recompute never fired on the approval's
      # own status write) and only the later siblings' hook writes caught
      # it up — which is why the final-state R29 case alone stayed green
      # for weeks with the bug live. remaining_usd additionally proves the
      # write node's individualHooks: true (formula recompute on save).
      assert:
        - collection: projects
          id_ref: proj_approved
          match: { committed_usd: 1000, remaining_usd: 4000 }
      timeout_s: 30
    # boundary runs AFTER within (order matters: approved total must be
    # exactly 1000 + 4000 = the 5000 budget when this one is judged).
    - target: pr_proj_boundary
      after_records: true
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> drawdown, exactly on budget"
      timeout_s: 30
    - target: pr_proj_over
      after_records: true
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> drawdown, over budget"
      timeout_s: 30

  # fixtures.actions — fire a post-action / one-click workflow on a fixture
  # record once, up front (after records exist), via the triggerWorkflows
  # query param. Here: drive po_closed (a draft PO with a line) to `closed`
  # through the Close PO post-action (workflow key f8gpu17s6hq, type action).
  # Its guard allows closing a draft/issued/partially_received PO. Run as
  # admin so the update clears ACL/field-whitelist cleanly — the close is
  # fixture setup, not the rule under test. internal_notes is a harmless
  # payload just to carry the triggering update.
  actions:
    - target: po_closed
      as: admin
      action: purchase_orders:update
      trigger_workflows: f8gpu17s6hq
      values: { internal_notes: "[TEST] close trigger" }
      assert:
        - collection: purchase_orders
          id_ref: po_closed
          match: { status: closed }
      timeout_s: 30
    # Drive po_issued draft -> issued through Issue PO (key issue_po, type
    # custom-action, sync). Custom-action (one-click) workflows fire via the
    # DEDICATED `<collection>:trigger` verb — verified live 2026-07-03 —
    # not by riding triggerWorkflows on a CRUD verb like the post-action
    # close above. No values needed. Run as admin: setup, not the rule under
    # test. If the guard rejects, the runner surfaces the workflow's own
    # response-message (HTTP 400) — read it, it names the failed condition.
    - target: po_issued
      as: admin
      action: purchase_orders:trigger
      trigger_workflows: issue_po
      assert:
        - collection: purchase_orders
          id_ref: po_issued
          match: { status: issued }
      timeout_s: 30
    # Drive proj_approved_2 -> completed through Complete Project (key
    # px2xvjaxoqf, custom-action, sync) so cases start against a stable
    # completed project. As admin: setup, not the rule under test (the
    # complete workflow's own role check passes admin; status check passes:
    # approved). R27's own allow case completes proj_approved as procurement.
    - target: proj_approved_2
      as: admin
      action: projects:trigger
      trigger_workflows: px2xvjaxoqf
      assert:
        - collection: projects
          id_ref: proj_approved_2
          match: { status: completed }
      timeout_s: 30

cases:
  # ==========================================================================
  # Converted to config checks 2026-07-05 (new nb-test model, see the nb-test
  # SKILL.md): plain grant / scope / field-whitelist facts are now asserted
  # against the live ACL config (type: acl; run alone with `runner.py acl`,
  # milliseconds each, admin reads only). A small `canary`-tagged runtime set
  # keeps proving the engine ENFORCES each mechanism class the project uses:
  #   - scoped grant, inside/outside  -> the R2 pair below
  #   - plain grant applies           -> R17 header-edit allow
  #   - no grant blocks               -> R20 operations-update deny
  #   - field whitelist ignores       -> R26 remaining_usd deny
  #   - trigger verb is ACL-gated     -> R27 operations trigger deny
  # Run canaries alone with `--tag canary`.
  # ==========================================================================
  - rule: R1
    name: operations holds purchase_requests:create (config)
    type: acl
    role: operations
    collection: purchase_requests
    action: create
    expect: granted

  # The R2 runtime pair doubles as the scoped-grant canaries (inside the
  # scope applies / outside it blocks).
  - rule: R2
    name: operations user can update their own info_requested PR (canary)
    tags: [canary]
    as: operations_a
    action: purchase_requests:update
    target: pr_draft_a
    values: { title: "[TEST] Office chairs (edited)" }
    expect: allow

  - rule: R2
    name: operations user cannot update another operations user's info_requested PR (canary)
    tags: [canary]
    as: operations_b
    action: purchase_requests:update
    target: pr_draft_a
    values: { title: "[TEST] hijacked" }
    expect: deny

  # Found red on draft (2026-07-05): the 2026-07-04 scope trim had landed in
  # the DEAD rolesResourcesScopes table; the live grant pointed at generic
  # "Own records" (no status clause), letting a submitter edit their own
  # mid-flow PR. Fixed same day with Alexander's approval — new scope
  # 373881040338944 "PR — own and info requested" (status + createdBy/
  # submitter ownership), grant repointed. See D72. Green since.
  - rule: R2
    name: operations PR update grant is scoped to status info_requested (config)
    type: acl
    role: operations
    collection: purchase_requests
    action: update
    expect: granted
    scope: { status: { $eq: info_requested } }

  - rule: R3
    name: operations cannot destroy purchase requests (config)
    type: acl
    role: operations
    collection: purchase_requests
    action: destroy
    expect: absent

  # --- R4/R5: only procurement has independent create config on these two
  # collections (D56); director/finance/member/operations all fall through
  # to member's view-only baseline. Config checks — `absent` adds the base
  # `member` role automatically (union role mode).
  - rule: R4
    name: procurement holds purchase_orders:create (config)
    type: acl
    role: procurement
    collection: purchase_orders
    action: create
    expect: granted

  - rule: R4
    name: director has no purchase_orders:create (config)
    type: acl
    role: director
    collection: purchase_orders
    action: create
    expect: absent

  - rule: R5
    name: procurement holds po_lines:create (config)
    type: acl
    role: procurement
    collection: po_lines
    action: create
    expect: granted

  - rule: R5
    name: director has no po_lines:create (config)
    type: acl
    role: director
    collection: po_lines
    action: create
    expect: absent

  # --- R12/R13: director's render-enabler update grant (D55/D57/D58) as
  # config checks: the grant exists, its scope is the director stage, and
  # the field whitelist is exactly the three render-enablers. R13 (deny
  # outside the stage) is the same scope read: any other status falls
  # outside the one scope clause. Scoped-grant ENFORCEMENT is proven by the
  # R2 canary pair — same mechanism class.
  - rule: R12
    name: director PR update is stage-scoped with exactly the 3 render-enabler fields (config)
    type: acl
    role: director
    collection: purchase_requests
    action: update
    expect: granted
    scope: { status: { $eq: pending_director_approval } }
    fields_equal: [rejection_comment, rejection_reason_category, signature]

  - rule: R13
    name: director PR update scope is the director stage only (config)
    type: acl
    role: director
    collection: purchase_requests
    action: update
    expect: granted
    scope: { status: { $eq: pending_director_approval } }

  # --- R14: regression lock on the D55 fix (stray create action removed)
  - rule: R14
    name: director has no purchase_requests:create (config)
    type: acl
    role: director
    collection: purchase_requests
    action: create
    expect: absent

  # --- R15: allow counterpart to R16. pr_approved is driven to status:
  # approved via fixtures.approvals above, so "Guard: Create PO (PR must be
  # approved)" lets this through. The PO created here is a case artifact,
  # not a fixture - it can't be reused by R17/R20/etc., which need their
  # own seeded PO record.
  - rule: R15
    name: procurement can create a PO from an approved PR
    as: procurement_a
    action: purchase_orders:create
    values: { purchase_request: "@ref:pr_approved", currency: USD, total: 100 }
    expect: allow

  # --- R16: "Guard: Create PO (PR must be approved)" rejects with HTTP 400
  # (not 401/403) - confirmed live 2026-07-02, see runner.py DENY_CODES.
  - rule: R16
    name: procurement cannot create a PO from a PR that is not approved
    as: procurement_a
    action: purchase_orders:create
    values: { purchase_request: "@ref:pr_draft_a", currency: USD, total: 100 }
    expect: deny

  # --- R19/R23: finance and operations have no independent create grant on
  # purchase_orders/po_lines (D59 audit) — member view-only baseline, same
  # as director in R4/R5. Multi-role config checks (member auto-included).
  - rule: R19
    name: finance and operations have no purchase_orders:create (config)
    type: acl
    roles: [finance, operations]
    collection: purchase_orders
    action: create
    expect: absent

  - rule: R23
    name: finance and operations have no po_lines:create (config)
    type: acl
    roles: [finance, operations]
    collection: po_lines
    action: create
    expect: absent

  # --- R17: procurement's PO update grant is unscoped (any non-terminal
  # status; the "PO Immutability" guard alone blocks terminal — R18) and
  # there is no destroy grant. The header-edit allow is kept as the
  # plain-grant canary; internal_notes touches no guard.
  - rule: R17
    name: procurement can update a draft PO's header (canary)
    tags: [canary]
    as: procurement_a
    action: purchase_orders:update
    target: po_draft
    values: { internal_notes: "[TEST] procurement header edit" }
    expect: allow

  - rule: R17
    name: procurement holds purchase_orders:update (config)
    type: acl
    role: procurement
    collection: purchase_orders
    action: update
    expect: granted

  - rule: R17
    name: procurement has no purchase_orders:destroy (config)
    type: acl
    role: procurement
    collection: purchase_orders
    action: destroy
    expect: absent

  # --- R20: director/finance/operations have no independent grant on
  # purchase_orders -> member view-only baseline. Config checks; one
  # runtime deny kept as the no-grant canary.
  - rule: R20
    name: director, finance, and operations have no purchase_orders:update (config)
    type: acl
    roles: [director, finance, operations]
    collection: purchase_orders
    action: update
    expect: absent

  - rule: R20
    name: director, finance, and operations have no purchase_orders:destroy (config)
    type: acl
    roles: [director, finance, operations]
    collection: purchase_orders
    action: destroy
    expect: absent

  - rule: R20
    name: operations cannot update a PO (canary)
    tags: [canary]
    as: operations_a
    action: purchase_orders:update
    target: po_draft
    values: { internal_notes: "[TEST] should be blocked" }
    expect: deny

  # --- R21: procurement adds/updates po_lines on the draft po_draft. A small
  # line (10) keeps the PO total (existing 50 + 10 = 60) under the PR's 100.
  # Updating only `description` skips the budget guard (no price/qty in values).
  # An over-budget create (100 x 10 = 1000) trips "Guard: PO Line Create —
  # budget ceiling" -> HTTP 400 deny.
  - rule: R21
    name: procurement can add a within-budget line to a draft PO
    as: procurement_a
    action: po_lines:create
    values: { purchase_order: "@ref:po_draft", description: "[TEST] extra line", quantity_ordered: 1, unit_price: 10 }
    expect: allow

  - rule: R21
    name: procurement can update a line's description on a draft PO
    as: procurement_a
    action: po_lines:update
    target: po_draft_line
    values: { description: "[TEST] line edited by procurement" }
    expect: allow

  - rule: R21
    name: procurement cannot add a line that pushes the PO over the PR budget
    as: procurement_a
    action: po_lines:create
    values: { purchase_order: "@ref:po_draft", description: "[TEST] over budget", quantity_ordered: 100, unit_price: 10 }
    expect: deny

  # --- R24: director/finance/operations have no independent grant on
  # po_lines -> member view-only baseline. Config checks; the no-grant
  # canary is R20's (same mechanism class, no per-collection repeat).
  - rule: R24
    name: director, finance, and operations have no po_lines:update (config)
    type: acl
    roles: [director, finance, operations]
    collection: po_lines
    action: update
    expect: absent

  - rule: R24
    name: director, finance, and operations have no po_lines:destroy (config)
    type: acl
    roles: [director, finance, operations]
    collection: po_lines
    action: destroy
    expect: absent

  # --- R18: po_closed is driven to `closed` by fixtures.actions. Procurement
  # can edit a DRAFT PO's header (R17), so a deny here isolates the "PO
  # Immutability" guard (blocks update on completed/closed) from ACL.
  - rule: R18
    name: procurement cannot update a closed (terminal) PO
    as: procurement_a
    action: purchase_orders:update
    target: po_closed
    values: { internal_notes: "[TEST] should be blocked (terminal)" }
    expect: deny

  # --- R21 delete-deny: procurement HAS destroy on po_lines and can delete a
  # line while the PO is draft, so a deny on po_closed_line (parent closed)
  # isolates "Guard: PO Line Destroy — block once PO issued" from ACL.
  - rule: R21
    name: procurement cannot delete a line once the PO is no longer draft
    as: procurement_a
    action: po_lines:destroy
    target: po_closed_line
    expect: deny

  # --- R22: receiving. po_issued is driven to `issued` by fixtures.actions.
  # Three guards fire on po_lines update; checked all three node chains live
  # 2026-07-03 before drafting:
  #   - "Guard: Receive" blocks a received_quantity update unless the parent
  #     PO is in the receivable set issued/partially_received/received (D69
  #     trimmed the dead sent/confirmed clauses) — so the po_draft_line case
  #     isolates it.
  #   - "Guard: PO Line Update — budget ceiling" only fires when values carry
  #     quantity_ordered/unit_price — a received_quantity-only update skips it.
  #   - "Guard: PO Line Immutability" only bites on completed/closed — issued
  #     passes.
  # received_quantity is in procurement's po_lines update whitelist (D59,
  # re-confirmed live 2026-07-03); operations has no update grant at all, so
  # its deny isolates ACL, not a guard.
  - rule: R22
    name: procurement can record receiving on a line of an issued PO
    as: procurement_a
    action: po_lines:update
    target: po_issued_line
    values: { received_quantity: 1 }
    expect: allow

  - rule: R22
    name: procurement cannot record receiving while the PO is still draft
    as: procurement_a
    action: po_lines:update
    target: po_draft_line
    values: { received_quantity: 1 }
    expect: deny
  # (R22's "director/finance/operations cannot record receiving" side is the
  # same no-update-grant fact R24's config check asserts — no runtime repeat.)

  # --- R44: the line freeze (D87, guard eiscjvwiqr6). Block side, pass side,
  # and the admin exemption. The "receiving still works on an issued PO" side
  # is R22's first case above — same fixture, already asserted, not repeated.
  # po_issued is driven draft -> issued by fixtures.actions before cases run.
  - rule: R44
    name: procurement cannot change the quantity on an issued PO's line
    as: procurement_a
    action: po_lines:update
    target: po_issued_line
    values: { quantity_ordered: 3 }
    expect: deny

  - rule: R44
    name: procurement cannot change the unit price on an issued PO's line
    as: procurement_a
    action: po_lines:update
    target: po_issued_line
    values: { unit_price: 30 }
    expect: deny

  # Pass side: the same edit the two cases above reject is fine while the PO
  # is still draft. R42's cases also exercise draft quantity/price edits, but
  # this one is the freeze guard's own boundary (draft vs non-draft) rather
  # than a recompute assertion, so it belongs to R44.
  - rule: R44
    name: the same quantity change is allowed while the PO is still draft
    as: procurement_a
    action: po_lines:update
    target: po_draft_line
    values: { quantity_ordered: 3 }
    expect: allow

  - rule: R44
    name: admin can still fix an issued PO's line (the cleanup exemption)
    as: admin
    action: po_lines:update
    target: po_issued_line
    values: { unit_price: 30 }
    expect: allow

  # --- R45: bypass shapes. All three of these passed the FIRST version of the
  # guard, which asked "is quantity or price being set" — an empty value and
  # an absent one look identical to that test, so blanking sailed through, and
  # so did anything riding along with a receiving entry. Found by the first of
  # these cases failing on 2026-07-18; the guard was inverted to "allow only a
  # plain receiving entry" and re-tested. Keep all three: they are the reason
  # the rule is shaped the way it is.
  - rule: R45
    name: procurement cannot blank the quantity on an issued PO's line
    as: procurement_a
    action: po_lines:update
    target: po_issued_line
    values: { quantity_ordered: null }
    expect: deny

  - rule: R45
    name: a quantity change smuggled in alongside a receiving entry is refused
    as: procurement_a
    action: po_lines:update
    target: po_issued_line
    values: { received_quantity: 1, quantity_ordered: 3 }
    expect: deny

  - rule: R45
    name: any other line edit on an issued PO is refused too (description)
    as: procurement_a
    action: po_lines:update
    target: po_issued_line
    values: { description: "[TEST] post-issue description edit" }
    expect: deny

  # --- R50: payload-shape sensitivity of the terminal-PO block (D89, guard
  # polncreateg1). The suite's other po_lines cases all name the parent as a
  # plain id, which is the one shape the old guard understood — that is why it
  # stayed green while the nested shape returned HTTP 500 to anyone calling the
  # API directly. The nested case below is the regression guard: a 500 is not
  # in the runner's DENY_CODES, so it fails loudly if the resolver ever goes
  # back to reading the submitted value straight. Keep the plain-id twin next
  # to it — together they assert the two shapes behave identically.
  - rule: R50
    name: Pat cannot add a line to a closed PO, order written the way the screens write it
    as: procurement_a
    action: po_lines:create
    values: { purchase_order: "@ref:po_closed", description: "[TEST] shape plain", quantity_ordered: 1, unit_price: 1 }
    expect: deny

  - rule: R50
    name: Pat cannot add a line to a closed PO, order written the other way (this one used to crash)
    as: procurement_a
    action: po_lines:create
    values: { purchase_order: { id: "@ref:po_closed" }, description: "[TEST] shape nested", quantity_ordered: 1, unit_price: 1 }
    expect: deny

  - rule: R50
    name: Pat cannot add a line that says nothing about which order it belongs to
    as: procurement_a
    action: po_lines:create
    values: { description: "[TEST] shape orphan", quantity_ordered: 1, unit_price: 1 }
    expect: deny

  # The pass side: the nested shape must still be allowed on a draft PO, or the
  # fix would read as green simply by blocking everything. 1 x 1 clears the
  # budget ceiling against the PR's quoted_total.
  - rule: R50
    name: Pat can still add a line to a draft PO, order written the other way
    as: procurement_a
    action: po_lines:create
    values: { purchase_order: { id: "@ref:po_draft" }, description: "[TEST] shape nested draft", quantity_ordered: 1, unit_price: 1 }
    expect: allow

  # The budget-ceiling check on a new line had the identical fault (D89, guard
  # 8u81nd3vxhc), in two places: the lookup of the order and the sum of its
  # existing lines. It hid behind its own first question — it only looks the
  # order up once a quantity AND a price are both present, so the cases above,
  # which leave the price off, never reached it. These two always carry a
  # price. The over-budget one is the sharper of the pair: it can only produce
  # the right refusal if BOTH lookups resolved, since the message compares the
  # running total against the approved amount.
  - rule: R50
    name: Pat is told a priced line would go over the approved amount, order written the other way
    as: procurement_a
    action: po_lines:create
    values: { purchase_order: { id: "@ref:po_draft" }, description: "[TEST] shape nested over budget", quantity_ordered: 100, unit_price: 10 }
    expect: deny

  - rule: R50
    name: Pat can add a priced line within the approved amount, order written the other way
    as: procurement_a
    action: po_lines:create
    values: { purchase_order: { id: "@ref:po_draft" }, description: "[TEST] shape nested priced", quantity_ordered: 1, unit_price: 10 }
    expect: allow

  # ==========================================================================
  # R25-R30: projects. All tagged [projects] for scoped first runs
  # (--tag projects). Guard interference checked before drafting
  # (2026-07-04): "Guard: Project Immutability" (2h75zryz3cb, sync 400)
  # bites update/destroy when status is any pending_*, approved, or completed —
  # deny cases against those statuses isolate the GUARD; the draft-status
  # allow cases isolate ACL. Destroy-deny isolates ACL (no role has destroy
  # at any status). Complete denies: 403 = ACL (no trigger grant), 400 = the
  # complete workflow's own status/role End-nodes.
  # ORDER SENSITIVE: the R28 link-allow case and the R29/R30 state cases
  # must run BEFORE R27's complete-allow case turns proj_approved `completed`
  # (committed_usd is unaffected by completion, but the link-allow would
  # false-fail). Keep the R27 block last.
  # ==========================================================================

  # --- R25: only operations has create on projects (ACL audit 2026-07-04).
  # Config checks; the allow side is also exercised every run by the
  # projects fixtures (all created as operations users).
  - rule: R25
    name: operations holds projects:create (config)
    type: acl
    role: operations
    collection: projects
    action: create
    expect: granted
    tags: [projects]

  - rule: R25
    name: procurement, director, and finance have no projects:create (config)
    type: acl
    roles: [procurement, director, finance]
    collection: projects
    action: create
    expect: absent
    tags: [projects]

  # --- R26 (D66 built 2026-07-05): the three scoped update grants and the
  # no-delete fact are config checks below (scope + exact field whitelist,
  # read live 2026-07-05). Runtime keeps four cases, each for something
  # config can't show: the guard's pass side (draft edit goes through),
  # the guard's block side isolated from ACL (proj_purchasing), the
  # owner's mid-flow deny (second deny side D63 asked for), and the
  # whitelist canary. Ownership/stage-scope ENFORCEMENT class is the R2
  # canary pair. Dept-head content edit at pending_dept_approval is an
  # approver-interface mechanism (editable fields on the Dept Owner
  # Approval node): UI not built yet, no runner case — manual check when
  # Alexander builds the form.
  - rule: R26
    name: operations project update is own + draft/info_requested, content fields only (config)
    type: acl
    role: operations
    collection: projects
    action: update
    expect: granted
    scope:
      $and:
        - createdBy: { id: { $eq: "{{$user.id}}" } }
        - status: { $in: [draft, info_requested] }
    fields_equal: [attachments, budget_usd, description, id, justification, title]
    tags: [projects]

  - rule: R26
    name: procurement project update is purchasing-stage, metadata fields only (config)
    type: acl
    role: procurement
    collection: projects
    action: update
    expect: granted
    scope: { status: { $eq: pending_purchasing_review } }
    fields_equal: [approval_document, id, rejection_comment, rejection_reason_category]
    tags: [projects]

  - rule: R26
    name: director project update is director-stage, metadata fields only (config)
    type: acl
    role: director
    collection: projects
    action: update
    expect: granted
    scope: { status: { $eq: pending_director_approval } }
    fields_equal: [approval_document, id, rejection_comment, rejection_reason_category]
    tags: [projects]

  - rule: R26
    name: no business role holds projects:destroy (config)
    type: acl
    roles: [operations, procurement, director, finance]
    collection: projects
    action: destroy
    expect: absent
    tags: [projects]

  # Guard pass side: the immutability guard must NOT fire on a draft
  # project — the owner's edit goes through.
  - rule: R26
    name: owner can edit their own draft project (content fields)
    as: operations_a
    action: projects:update
    target: proj_draft
    values: { title: "[TEST] draft project (edited)" }
    expect: allow
    tags: [projects]

  # remaining_usd is not in any update whitelist: the app silently ignores
  # it (no 403). The runner's update-deny check is "the sent values were
  # NOT applied", which is exactly the intent here — this case fails only
  # if a whitelist change ever lets the value through. Field-whitelist
  # canary. (First-run lesson: an `expect: allow` carrying an ignored
  # field fails the runner's applied-values check — don't mix writable
  # and ignored fields.)
  - rule: R26
    name: owner cannot write remaining_usd directly (canary — field is ignored)
    tags: [projects, canary]
    as: operations_a
    action: projects:update
    target: proj_draft
    values: { remaining_usd: 999 }
    expect: deny

  # Second deny side (D63): the owner's direct edit on their own mid-flow
  # project — outside the ACL scope AND inside the guard's locked list.
  - rule: R26
    name: owner cannot edit a mid-flow project (pending dept approval)
    as: operations_proj
    action: projects:update
    target: proj_pending
    values: { title: "[TEST] should be blocked" }
    expect: deny
    tags: [projects]

  # Guard isolation: procurement's stage scope MATCHES here (ACL passes),
  # so this deny can only come from the guard's pending_purchasing_review
  # clause (sync request-interception, HTTP 400). Proves the stage grants
  # are render-enablers — direct API writes at a pending stage are blocked;
  # real metadata edits ride the approval interface, which bypasses the
  # guard (D63). One representative case: director's grant is the same
  # mechanism.
  - rule: R26
    name: procurement cannot directly edit a project even at its own stage (guard blocks; edits ride the approval interface)
    as: procurement_a
    action: projects:update
    target: proj_purchasing
    values: { rejection_comment: "[TEST] should be blocked by the guard" }
    expect: deny
    tags: [projects]

  # --- R28: create guard lylobzvlh5p blocks linking a non-approved project
  # (HTTP 400). The allow side must run while proj_approved is still open —
  # BEFORE R27's complete-allow below. The allow-case PR stays draft (no
  # quote), so it never enters committed_usd and teardown can delete it.
  - rule: R28
    name: PR cannot be created linked to a draft project
    as: operations_a
    action: purchase_requests:create
    values: { title: "[TEST] R28 blocked", project: "@ref:proj_draft" }
    expect: deny
    tags: [projects]

  - rule: R28
    name: PR cannot be created linked to a completed project
    as: operations_a
    action: purchase_requests:create
    values: { title: "[TEST] R28 blocked", project: "@ref:proj_approved_2" }
    expect: deny
    tags: [projects]

  - rule: R28
    name: PR can be created linked to an approved project
    as: operations_a
    action: purchase_requests:create
    values: { title: "[TEST] R28 allowed", project: "@ref:proj_approved" }
    expect: allow
    tags: [projects]

  # --- R29: outcomes of the drawdown chains driven in fixtures.approvals
  # (after_records pass). state cases: polled subset-match, admin read.
  - rule: R29
    name: over-budget project PR was auto-rejected at procurement approve
    type: state
    target: pr_proj_over
    match: { status: rejected }
    tags: [projects]

  - rule: R29
    name: within-budget project PR was approved
    type: state
    target: pr_proj_within
    match: { status: approved }
    tags: [projects]

  # The boundary drawdown (4000) sits exactly ON the 5000 budget: the live
  # check is strict `>`, so it still approves — R29's rule text says so.
  - rule: R29
    name: exactly-on-budget project PR still approves (strict greater-than)
    type: state
    target: pr_proj_boundary
    match: { status: approved }
    tags: [projects]

  # Final-state side of R29 (the first-approval side is the assert on the
  # pr_proj_within chain in fixtures.approvals — D78). 5000 = 1000 + 4000
  # approved; the rejected 9500 must not count. remaining_usd 0 proves the
  # formula tracked the last committed write.
  - rule: R29
    name: project committed_usd written at approval, approved PRs only (1000 + 4000, not 14500)
    type: state
    target: proj_approved
    match: { committed_usd: 5000, remaining_usd: 0 }
    tags: [projects]

  # --- R30: the within-budget PR reached `approved` off ONE procurement
  # decision (its fixture chain has a single step, no director/board) —
  # that is the unconditional director-skip. If the skip regressed, the PR
  # would sit at pending_director_approval and this match fails.
  - rule: R30
    name: project PR reached approved with procurement as the final human step
    type: state
    target: pr_proj_within
    match: { status: approved }
    tags: [projects]

  # ==========================================================================
  # R31-R38: PR Approval branch outcomes (approved + first run green
  # 2026-07-05). The chains ran in fixtures.approvals; these state cases
  # assert where each PR landed, so a failure classifies per rule.
  # Tagged [prflow] for scoped runs: --tag prflow.
  # ==========================================================================
  - rule: R31
    name: dept-bearing submitter's PR waits at the dept stage, stamped with submitter and department
    type: state
    target: pr_dept_pending
    match: { status: pending_dept_approval, submitterId: "@user:operations_proj", departmentId: 363554444476416 }
    tags: [prflow]

  - rule: R32
    name: dept head's approve moves the PR to purchasing review
    type: state
    target: pr_dept_flow
    match: { status: pending_purchasing_review }
    tags: [prflow]

  - rule: R33
    name: dept-head submitter skips their own dept stage (straight to purchasing review, zero approvals)
    type: state
    target: pr_head_skip
    match: { status: pending_purchasing_review }
    tags: [prflow]

  - rule: R34
    name: custom approver's approve moves the PR to purchasing review (their task, not the dept head's)
    type: state
    target: pr_custom
    match: { status: pending_purchasing_review }
    tags: [prflow]

  - rule: R35
    name: regular 250 USD purchase is approved with no director
    type: state
    target: pr_regular_small
    match: { status: approved }
    tags: [prflow]

  - rule: R35
    name: regular purchase of exactly 300 USD still goes to the director (boundary, >= is inclusive)
    type: state
    target: pr_regular_300
    match: { status: pending_director_approval }
    tags: [prflow]

  - rule: R35
    name: 100 USD purchase that is NOT regular goes to the director (D37 flip)
    type: state
    target: pr_pending_director
    match: { status: pending_director_approval }
    tags: [prflow]

  # pr_board's 3-step chain (procurement -> director -> BOARD) can only
  # complete if the board branch fired at exactly 15000 — the board step
  # finds no task otherwise and the fixture phase fails loudly.
  - rule: R36
    name: 15000 USD PR went through the board and ended approved (boundary, >= is inclusive)
    type: state
    target: pr_board
    match: { status: approved }
    tags: [prflow]

  - rule: R36
    name: below 15000 the director's approve is final (pr_approved reached approved with no board step)
    type: state
    target: pr_approved
    match: { status: approved }
    tags: [prflow]

  - rule: R37
    name: procurement returning a PR sets info_requested
    type: state
    target: pr_draft_a
    match: { status: info_requested }
    tags: [prflow]

  - rule: R37
    name: director returning a PR sets info_requested
    type: state
    target: pr_return_dir
    match: { status: info_requested }
    tags: [prflow]

  - rule: R38
    name: procurement rejecting ends the flow at rejected with the comment stored
    type: state
    target: pr_reject_proc
    match: { status: rejected, rejection_comment: "[TEST] procurement rejects — not needed" }
    tags: [prflow]

  - rule: R39
    name: dept-stage reject ends the project ladder at rejected
    type: state
    target: proj_rejected
    match: { status: rejected }
    tags: [projects]

  # --- R27: complete action. KEEP LAST (the allow case completes proj_approved).
  # The operations deny doubles as the trigger-gating canary (403 = no
  # `trigger` grant on the collection).
  - rule: R27
    name: operations cannot fire the complete action (canary — no trigger grant)
    as: operations_a
    action: projects:trigger
    target: proj_approved
    trigger_workflows: px2xvjaxoqf
    expect: deny
    tags: [projects, canary]

  - rule: R27
    name: a draft project cannot be completed
    as: procurement_a
    action: projects:trigger
    target: proj_draft
    trigger_workflows: px2xvjaxoqf
    expect: deny
    tags: [projects]

  - rule: R27
    name: a completed project cannot be completed again
    as: procurement_a
    action: projects:trigger
    target: proj_approved_2
    trigger_workflows: px2xvjaxoqf
    expect: deny
    tags: [projects]

  - rule: R27
    name: procurement can complete an approved project
    as: procurement_a
    action: projects:trigger
    target: proj_approved
    trigger_workflows: px2xvjaxoqf
    expect: allow
    tags: [projects]

  - rule: R27
    name: the completed project actually reached status completed
    type: state
    target: proj_approved
    match: { status: completed }
    tags: [projects]

  # ==========================================================================
  # R40-R41: suppliers + departments audit (approved + green 2026-07-05).
  # Pure config checks: no enabled workflow touches either collection, and
  # every enforcement mechanism class already has a canary. `absent`
  # includes the base member role automatically.
  # ==========================================================================
  - rule: R40
    name: procurement holds suppliers:create (config)
    type: acl
    role: procurement
    collection: suppliers
    action: create
    expect: granted

  - rule: R40
    name: procurement holds suppliers:update (config)
    type: acl
    role: procurement
    collection: suppliers
    action: update
    expect: granted

  - rule: R40
    name: nobody can delete a supplier (config)
    type: acl
    roles: [procurement, operations, director, finance]
    collection: suppliers
    action: destroy
    expect: absent

  - rule: R40
    name: operations, director, and finance cannot create suppliers (config)
    type: acl
    roles: [operations, director, finance]
    collection: suppliers
    action: create
    expect: absent

  - rule: R40
    name: operations, director, and finance cannot update suppliers (config)
    type: acl
    roles: [operations, director, finance]
    collection: suppliers
    action: update
    expect: absent

  - rule: R40
    name: every signed-in user can view suppliers (member strategy view)
    type: acl
    role: member
    collection: suppliers
    action: view
    expect: granted

  - rule: R41
    name: no business role can create a department (config)
    type: acl
    roles: [operations, procurement, director, finance]
    collection: departments
    action: create
    expect: absent

  # Found red on draft (2026-07-05): procurement's role STRATEGY was
  # view+update+trigger — the update fallback reached every collection
  # without a per-collection entry (departments, users, roles, files,
  # pr_comments), so Pat could update any department's main_approver.
  # Trimmed to view+trigger same day with Alexander's approval (products/
  # units_of_measure unaffected — they have full per-collection entries).
  # See D73. Green since.
  - rule: R41
    name: no business role can update a department (config)
    type: acl
    roles: [operations, procurement, director, finance]
    collection: departments
    action: update
    expect: absent

  - rule: R41
    name: no business role can delete a department (config)
    type: acl
    roles: [operations, procurement, director, finance]
    collection: departments
    action: destroy
    expect: absent

  - rule: R41
    name: every signed-in user can view departments (member strategy view)
    type: acl
    role: member
    collection: departments
    action: view
    expect: granted

  # ==========================================================================
  # R42: the PO's Lines Total tracks the sum of its lines. One PO (po_r42),
  # one line (po_r42_line), driven through all four transitions IN ORDER —
  # the runner executes cases top to bottom, so each state case reads the
  # total left by the mutation directly above it. Values: 2 x 25 = 50 at
  # creation, then 6 x 25 = 150, then 6 x 50 = 300, then the line is deleted.
  # 300 stays under pr_approved_5's 500 quoted_total, so the D47 budget
  # ceiling guard never fires — a deny here would mean the ceiling regressed,
  # not the recompute.
  # The create/update recompute is ASYNC, so these state cases rely on
  # poll_assert's retry window rather than reading once. The delete recompute
  # is SYNC and is already done when the destroy returns; its state case
  # polls too, which costs nothing and keeps the four cases uniform.
  # Not covered here: the import-created path (payload PO link empty). Import
  # is a UI action the runner cannot drive — manual check, D83's 016 B-cases.
  - rule: R42
    name: creating a line sets the PO's Lines Total to the line's total (2 x 25 = 50)
    type: state
    target: po_r42
    match: { lines_total: 50 }
    tags: [po_lines, r42]

  - rule: R42
    name: procurement raises the line quantity 2 -> 6 on a draft PO
    as: procurement_a
    action: po_lines:update
    target: po_r42_line
    values: { quantity_ordered: 6 }
    expect: allow
    tags: [po_lines, r42]

  - rule: R42
    name: Lines Total catches up after the quantity change (6 x 25 = 150)
    type: state
    target: po_r42
    match: { lines_total: 150 }
    tags: [po_lines, r42]

  - rule: R42
    name: procurement raises the line unit price 25 -> 50 on a draft PO
    as: procurement_a
    action: po_lines:update
    target: po_r42_line
    values: { unit_price: 50 }
    expect: allow
    tags: [po_lines, r42]

  - rule: R42
    name: Lines Total catches up after the unit price change (6 x 50 = 300)
    type: state
    target: po_r42
    match: { lines_total: 300 }
    tags: [po_lines, r42]

  - rule: R42
    name: procurement deletes the line while the PO is still draft
    as: procurement_a
    action: po_lines:destroy
    target: po_r42_line
    expect: allow
    tags: [po_lines, r42]

  - rule: R42
    name: Lines Total drops to 0 once the PO's only line is deleted
    type: state
    target: po_r42
    match: { lines_total: 0 }
    tags: [po_lines, r42]

  # ==========================================================================
  # R43: the PR lock, block side. Each case edits `description` — inside
  # procurement's field whitelist, and untouched by the PR Budget (update)
  # guard, which only fires on amount/fx rate/project link. So the only thing
  # that can produce a deny here is Guard A itself.
  # pr_approved (status approved) and pr_proj_over (auto-rejected by the
  # over-budget backstop, R29) are both already-existing fixtures; a DENIED
  # update leaves them untouched, so no other rule's cases are affected.
  - rule: R43
    name: procurement cannot edit an approved PR, though its permissions would allow the field
    as: procurement_a
    action: purchase_requests:update
    target: pr_approved
    values: { description: "[TEST] should be blocked by the lock" }
    expect: deny
    tags: [purchase_requests, r43]

  - rule: R43
    name: procurement cannot edit a rejected PR either
    as: procurement_a
    action: purchase_requests:update
    target: pr_proj_over
    values: { description: "[TEST] should be blocked by the lock" }
    expect: deny
    tags: [purchase_requests, r43]

  # The exemption, as a canary: if this ever flips to deny, teardown starts
  # failing and the tempting "fix" is to disable the guard. Catch it here
  # instead, as a named case with a reason attached.
  - rule: R43
    name: admin can still edit an approved PR (the cleanup exemption)
    as: admin
    action: purchase_requests:update
    target: pr_approved
    values: { description: "[TEST] admin exemption probe" }
    expect: allow
    tags: [purchase_requests, r43, canary]

  # --- R46/R48/R49 (chunk 020). One chain on po_issued and its single line
  # po_issued_line (quantity_ordered 2), driven in order. ORDER MATTERS: each
  # case starts from the received quantity the previous one left behind, and
  # the state cases read the parent PO's status after the sync recompute.
  # Entry state: R22's earlier case set received_quantity to 1, so po_issued
  # is Partially Received when this block starts.
  #   2 -> Received | 0 -> Issued (the 020 fix) | -1 -> refused | 3 -> allowed
  # The recompute (ork27v016yo) is sync, so the parent status is already
  # written when the update returns; the state cases still poll.
  # The three other guards on po_lines update stay out of the way here for
  # the reasons R22's comment records: budget ceiling and immutability only
  # fire on quantity/price or on completed/closed.
  - rule: R46
    name: receiving the last outstanding quantity takes the order to Received
    as: procurement_a
    action: po_lines:update
    target: po_issued_line
    values: { received_quantity: 2 }
    expect: allow
    tags: [po_lines, receiving, chunk-020]

  - rule: R46
    name: order reads Received once nothing is outstanding
    type: state
    target: po_issued
    match: { status: received }
    tags: [po_lines, receiving, chunk-020]

  # The 020 fix itself. Before it, this left the order on Partially Received
  # permanently — the defect the exploratory pilot found.
  - rule: R46
    name: correcting the receipt back to zero is allowed
    as: procurement_a
    action: po_lines:update
    target: po_issued_line
    values: { received_quantity: 0 }
    expect: allow
    tags: [po_lines, receiving, chunk-020]

  - rule: R46
    name: order returns to Issued once no line has anything received
    type: state
    target: po_issued
    match: { status: issued }
    tags: [po_lines, receiving, chunk-020]

  # R48: refused on the field, so this is a 400 from validation rather than
  # from a guard workflow. Runs while the order is Issued, i.e. a state where
  # receiving is otherwise perfectly allowed — so a pass here is the negative
  # being rejected, not the order being unreceivable.
  - rule: R48
    name: a negative received quantity is refused
    as: procurement_a
    action: po_lines:update
    target: po_issued_line
    values: { received_quantity: -5 }
    expect: deny
    tags: [po_lines, receiving, chunk-020]

  - rule: R48
    name: the negative never reached the database
    type: state
    target: po_issued_line
    match: { received_quantity: 0 }
    tags: [po_lines, receiving, chunk-020]

  # Admin side of R48: the one guard-style rule on this collection that is
  # deliberately NOT admin-exempt, because a negative is bad data whoever
  # types it. Tagged canary: if this ever flips to allow, the bound has been
  # moved off the field onto a request-level guard and quietly lost its reach.
  - rule: R48
    name: not even admin can save a negative received quantity
    as: admin
    action: po_lines:update
    target: po_issued_line
    values: { received_quantity: -1 }
    expect: deny
    tags: [po_lines, receiving, chunk-020, canary]

  # R49: 3 received against 2 ordered. Deliberate allow — see the rule.
  - rule: R49
    name: receiving more than ordered is still allowed
    as: procurement_a
    action: po_lines:update
    target: po_issued_line
    values: { received_quantity: 3 }
    expect: allow
    tags: [po_lines, receiving, chunk-020]

  - rule: R49
    name: the over-delivery counts as fully received
    type: state
    target: po_issued
    match: { status: received }
    tags: [po_lines, receiving, chunk-020]

teardown:
  sweep_collections: []
  # Two async workflows also trigger on purchase_requests create/update
  # ("Project Commit: recompute", "Guard A" above is sync). Since fixtures
  # here don't link a project, they should no-op. Watch for leftovers on
  # first run and add to sweep_collections if any turn up.
