# tests/plan.yaml — havenbeheer ACL test suite
# R1–R3 (purchase_requests / operations role) verified live 2026-07-02,
# 4/4 passed (see tests/reports/20260702-091759.md). No longer TODO.
#
# Retrofit pilot (nb-project-suite deliverable 6) is extending this suite
# with a full ACL/workflow audit, drafted rule by rule, group by group.
# New rules get # TODO verify until reviewed and run live.
#
# Checked for interference from request-interception guards on
# purchase_requests before drafting the update/destroy cases:
#   - "Guard A — PR Immutability Guard" blocks update/destroy only when
#     status is approved or rejected (re-verified live 2026-07-18, id
#     376198840057856). The dead `cancelled` clause left over from D68 was
#     dropped in D84; the guard's behaviour is unchanged. It does
#     NOT block info_requested, so R2 (edit) and R3 (destroy-deny via ACL)
#     both reach ACL as intended.
#   - "Guard: PR Budget (create) — block over-project-budget" triggers on
#     create but only matters when a project is linked; fixtures below don't
#     set project/projectId, so it should be a no-op. Flag to Alexander if
#     the create case fails unexpectedly — that guard is the first suspect.

rules:
  R1: Operations users can create purchase requests.
  R2: Operations users can update their own purchase request only while its status is info_requested; they cannot update another operations user's purchase request. Ownership = the acting user is the PR's creator (createdById) or submitter (submitterId). (D68 retired draft; the only operations-editable status is now info_requested, reached by an approver returning the PR for info.)
  R3: Operations users cannot delete purchase requests.
  R4: Only procurement can create purchase orders; director cannot create one. Verified live 2026-07-04 — procurement holds a purchase_orders:create grant; director has no PO resource entry and its role strategy is view-only.
  R5: Only procurement can create po_lines; director cannot create one. Verified live 2026-07-04 — procurement holds a po_lines:create grant; director has no po_lines resource entry and its role strategy is view-only.
  R12: Director can update the render-enabler fields (rejection_comment, rejection_reason_category, signature) on a purchase request while it is at pending_director_approval (its own approval stage). Narrowed 2026-07-02 (D58) - project/projectId dropped from this grant, no longer part of the rule. Verified live 2026-07-04 — update scope "PR — pending director approval" = status $eq pending_director_approval; field whitelist is exactly those three, no project/projectId.
  R13: Director cannot update PR fields outside its own approval stage (pending_director_approval). Verified live 2026-07-04 — the director update grant's only scope is status $eq pending_director_approval, so any other status (here info_requested) falls outside it and is denied.
  R14: Director cannot create purchase requests. Verified live 2026-07-04 — director's purchase_requests grant has only view + update actions (no create), and its role strategy is view-only.
  R15: Procurement can create a purchase order from a purchase request whose status is approved (the allow counterpart to R16). Reviewed + verified live 2026-07-02.
  R16: 'Procurement cannot create a PO from a purchase request that is not approved. Verified live 2026-07-04 — "Guard: Create PO (PR must be approved)" (global on purchase_orders:create) blocks when the source PR''s status is not approved (also blocks if the PR already has a PO).'
  R17: Procurement can update a PO's header fields at any non-terminal status (draft/issued/partially_received/received) — the update ACL grant is unscoped and the PO Immutability guard blocks only the terminal statuses (completed/closed) — and cannot delete a PO at any status — procurement has no destroy grant on purchase_orders (D56/D59, ACL re-verified live 2026-07-04; D69 retired the sent/confirmed statuses).
  R20: Director, finance, and operations users cannot update or delete a purchase order — none has an independent grant, so they fall through to member's view-only baseline (D59).
  R18: Once a PO is terminal (completed/closed), no role — including procurement, which can edit a draft PO — can update it; the PO-immutability guard blocks it independent of ACL (D33).
  R21: Procurement can add and update po_lines on a non-terminal (draft) PO and can delete a line only while the PO is draft; once the PO is non-draft the line-destroy guard blocks deletion. A line create that would push the PO total over the source PR's quoted_total is blocked by the PO-line budget-ceiling guard (D47/D49).
  R22: Procurement records receiving by updating a po_line's received_quantity, allowed only once the PO is issued (receivable set = issued/partially_received/received) — the Receive guard blocks a received_quantity update while the PO is still draft. Director, finance, and operations users cannot record receiving at all (no update grant, member view-only baseline; receiving sits on procurement as a deliberate interim, D59). # D69 trimmed the guard's dead sent/confirmed clauses; verified live 2026-07-05
  R24: Director, finance, and operations users cannot update or delete po_lines — none has an independent grant, member view-only baseline (D59).
  # --- R15/R17-R24 drafted 2026-07-02 from the full purchase_orders/po_lines
  # ACL audit across all 5 roles (D59; audit begun in D56), business rules
  # approved by Alexander. R15/R19/R23 verified earlier; R17/R20/R21/R24
  # promoted 2026-07-03 (D61) against po_draft; R18 + R21's delete-deny added
  # 2026-07-03 against the po_closed fixture. R22 drafted 2026-07-03 (tenth
  # session) against the po_issued fixture — Issue PO is a one-click
  # custom-action workflow, fired via the dedicated purchase_orders:trigger
  # verb (verified live; see fixtures.actions below).
  R19: Finance and operations users cannot create a purchase order (no independent create grant; view-only via member baseline).
  R23: Finance and operations users cannot create po_lines (no independent create grant; view-only via member baseline).
  # --- R25-R30 drafted 2026-07-04 (twelfth session) from the projects
  # backend hardened in D63/D64 (guard 2h75zryz3cb, Complete Project
  # px2xvjaxoqf — "Close Project" pre-D67, D53 backstop) and the projects ACL re-verified live this
  # session. Business rules locked with Alexander 2026-07-03 (see HANDOFF /
  # D63). All rule texts below reviewed and cleared by 2026-07-05
  # (eighteenth session); suite green 58/58 same day.
  R25: Only operations users can create projects; procurement, director, and finance cannot (no create grant — member view-only baseline).
  R26: Project edits are owner- and stage-scoped, never open to any operations user (ownership key = createdBy). The submitter can edit the content fields (title, budget_usd, description, justification, attachments) only while the project is draft or info_requested; no other operations user can edit a project they did not create. Once submitted, content edits happen only inside the approval flow — the department head can edit those same content fields, including budget_usd, while the project is at pending_dept_approval. The approval-metadata fields (rejection_comment, rejection_reason_category, approval_document) are editable only by the stage approver at that stage — procurement at pending_purchasing_review, director at pending_director_approval — and never outside it. remaining_usd (a formula) and committed_usd (written at approval by the PR Approval workflow, decreased on PR delete by the delete recompute — D78) are never directly writable by any role. rejected, approved, and completed projects are fully locked; a project advances only through the approval flow and is completed only via the Complete action (R27). No role can delete a project at any status. Admin is exempt throughout. # reviewed + approved by Alexander 2026-07-05 (eighteenth session); ran green same day. Dept-head content edit at pending_dept_approval waits on the approver-interface UI (Alexander) and has no runner case — manual check when that form is built
  R27: Only procurement can complete a project (dedicated Complete Project action; no other role has the trigger grant), and only an approved one — completing a draft, mid-flow, info_requested, or rejected project, or re-completing a completed one, is rejected. A successful completion sets status completed and stamps completed_at. # reviewed + approved by Alexander 2026-07-05 (eighteenth session); suite green same day, no role outside procurement holds the trigger grant (member/finance re-checked)
  R28: A purchase request cannot be created linked to a project whose status is anything other than approved — draft, any pending stage, info_requested, rejected, or the completed terminal all block; linking to an approved project is allowed. The same not-approved check also guards project re-links on PR update.
  R29: When procurement approves a project-linked PR, it is auto-rejected if the total of already-approved sibling PRs plus this PR exceeds the project's budget (strict greater-than — exactly on budget still approves); within budget it is approved, and the project's committed amount is written at that moment from inside the PR Approval workflow — the sum of approved sibling PRs including this one (D78; the old create/update recompute workflow is disabled). The committed amount must be correct immediately after EVERY single approval, not only at the end — under the pre-D78 bug it lagged one approval behind (the approval's own status write never fired the recompute).
  R30: A PR drawing on an approved project skips the director and board stages unconditionally — procurement approval is the final human step, regardless of amount.
  # --- R31-R39 drafted 2026-07-05 (nineteenth session) from the live PR
  # Approval node chain (key cv237r8h7k9; drafted against revision
  # 373617786945536 — revisions rotate, the key is the stable handle. D78
  # 2026-07-16 added the committed_usd write node on the drawdown branch;
  # node keys carried over, R31-R38 branch logic unchanged, re-verified
  # against the enabled revision that session.)
  # — the workflow-branch tier of the new nb-test model. Every boundary is
  # quoted from the live condition node, not from memory. Source checklist:
  # tests/manual-workflow-walkthrough.md (hand-passed 2026-06-13). Branches
  # deliberately NOT drafted (walkthrough-only, runner can't express them):
  # in-app notifications (A3/A8 FYIs), resubmit-after-return (applicant UI
  # action), board document-required form validation (A7).
  # All of R31-R41 reviewed + approved by Alexander 2026-07-05 (nineteenth
  # session); first run green same day, full suite 77/77.
  R31: A purchase request created by someone who belongs to a department starts at pending_dept_approval, and the workflow stamps the submitter's id and their department onto the PR.
  R32: The department head approving the dept stage moves the PR to pending_purchasing_review.
  R33: When the submitter is their own department's main approver, the dept stage is skipped — the PR goes straight to pending_purchasing_review (nobody reviews their own request at their own stage).
  R34: When the submitter picked a custom approver (all three read from the live condition — the flag is on, an approver is set, and it is not the submitter), that person replaces the dept head for the first stage; their approve moves the PR to pending_purchasing_review. The dept head only gets an FYI notification (notification itself not runner-checked).
  R35: 'After procurement approves, the director is required unless the purchase is regular AND under 300 USD — live condition: is_regular != true OR quoted_total_usd >= 300. So a regular 250 USD purchase is approved with no director; a regular purchase of exactly 300 USD still goes to the director (>= is inclusive); and a 100 USD purchase that is NOT regular also goes to the director (the D37 default flip).'
  R36: 'From 15000 USD up the director''s approve routes the PR to the board instead of approving it — live condition: quoted_total_usd >= 15000, checked after the director approves. The board''s approve then makes it approved. Below 15000 the director''s approve is final.'
  R37: An approver returning a PR to ask for more information sets it to info_requested — checked at the procurement and director stages (the dept, custom-approver, and board return branches are the same one-node pattern; walkthrough-covered). Note the director's return node requires picking a target stage (returnTo 1) — the runner returns to the procurement stage; status still reads info_requested and the procurement task re-opens.
  R38: An approver rejecting a PR ends the flow — status rejected, with the approver's comment stored as the rejection comment. Checked at the procurement stage.
  R39: Rejecting a project at its department stage ends the project ladder — status rejected. (Formalizes the proj_rejected fixture outcome as a rule-cited case.)
  # --- R40-R41 drafted 2026-07-05 (nineteenth session): the Step-6 audit
  # surface for suppliers and departments, from the live ACL read. No
  # enabled workflow touches either collection, so these are pure config
  # checks — enforcement mechanism classes are already canary-covered.
  R40: Procurement maintains the supplier list — it can create and update suppliers; nobody can delete one; every signed-in user can view them (member baseline).
  R41: Departments — including who each department's main approver is, which steers approval routing — are admin-maintained reference data. No business role may create, update, or delete a department; everyone can view them. # The live mismatch found on draft (procurement's strategy update fallback) was fixed 2026-07-05, Alexander's approval — see D73.
  # --- R42 drafted 2026-07-18 (D83), reviewed + approved by Alexander
  # 2026-07-18 (D84). Wording split create/update from delete: the two
  # recomputes differ in BOTH timing and mechanism, verified live 2026-07-18.
  # create/update (1ugka88lngm) is async and reloads the line from the DB;
  # delete (pnvp0dtitum) is sync and reads purchaseOrderId off the payload
  # (safe there — on a delete the row existed, so its PO link is filled in).
  # The import-created path has no runner case: import is a UI action the
  # runner can't drive. It stays a manual check (D83's parked 016 B-cases).
  # --- R43 drafted 2026-07-18 (D84). Fills a real gap: Guard A's BLOCK side
  # had no case at all — only its pass side (R2's info_requested edits) and
  # its admin exemption (implicitly, via teardown deleting approved PRs).
  # workflows-explained.md §3.5 rests the committed_usd correctness argument
  # on this guard, so it was load-bearing and untested.
  # Layer attribution (checked live 2026-07-18 before drafting): procurement's
  # purchase_requests update grant is UNSCOPED and its field whitelist
  # includes `description`, so an edit to description on an approved PR is
  # allowed by ACL and can only be stopped by the guard — a deny here is the
  # guard, not permissions. Deliberately NOT drafted, because ACL denies them
  # first and the case would prove nothing: the submitter editing their own
  # approved PR (operations' grant is scoped to info_requested) and any role
  # deleting one (no business role holds destroy on purchase_requests).
  # `description` also keeps the PR Budget (update) guard out of it — that one
  # only fires on amount, fx rate or project link.
  R43: Once a purchase request reaches Approved or Rejected it is locked. No business role can change any field on it, whatever their permissions would otherwise allow — the safety net blocks the request before it reaches the database. Admin and root are exempt, so cleanup and test teardown stay possible. (Guard 496ookqmg01, version 376198840057856; D84 dropped a dead `cancelled` clause left over from D68.)
  R44: Once a purchase order leaves Draft, the only change allowed on its lines is recording receiving. Quantity and unit price are fixed at issue — the numbers on the document the supplier already received cannot change afterwards. Lines stay fully editable while the order is still Draft. Admin and root are exempt so mistakes can be fixed. (D87, guard eiscjvwiqr6. This is about matching the printed order, not about budget — staying under the approved amount is already enforced separately at every status by the line budget-ceiling guard c9c14tyn876.)
  R45: 'The freeze cannot be sidestepped by how the change is phrased. Erasing a quantity counts as changing it, and so does smuggling a quantity change alongside a receiving entry in the same save. Anything that is not purely a receiving entry is refused on an issued order. (D87. Found by testing — the original guard asked "is a quantity or price being set", which an empty value slipped past, because an absent field and an emptied field look identical to it. The rule was inverted to "allow only receiving" instead.)'
  # --- R46-R49 drafted 2026-07-19 (chunk 020) from the three defects the
  # exploratory pilot found. All four mechanisms were built and proven live
  # the same day; see the phase notes in chunks/020.
  R46: An order follows its receipts both up and down. Recording receipts moves it to Partially Received and then to Received; correcting them back down moves it back, and once no line has anything received at all it returns to Issued and behaves like a freshly issued order. Before chunk 020 the last step was missing — an order that had everything corrected back to zero stuck on Partially Received forever, showing zero received on every line, with no way back. (Recompute ork27v016yo, version 376327812808704, new node izqqb38q6f8. Found by the 2026-07-19 exploratory pilot, not by the runner — the rules covered the paths, the bug lived in the sequence.) The same roll-up can never drag a FINISHED order backwards — it only moves an order that is currently Issued, Partially Received or Received, so a Completed or Closed one keeps its status whatever happens to its lines afterwards. # That backwards-drag half has no runner case of its own and cannot get one — the Receive guard refuses a received_quantity edit on a finished order first, so the API never reaches it. It is the second line of defence, for the routes the guard does not see (nested writes, imports, workflow-internal updates), and was verified 2026-07-19 by running the recompute directly against a closed order holding a fully-received line: the status write matched 0 rows and the order stayed Closed.
  R48: 'A received quantity below zero is refused, whoever sends it — admin included. Before chunk 020 a negative saved silently and the line still displayed as Pending, so the bad number sat in the data and every sum over received quantities was wrong. The refusal is enforced on the field itself rather than by a safety net on the request, so it also holds for saves that arrive through a sub-table, an import, or a workflow, not just a direct edit. (020 Phase 2; field validation on po_lines.received_quantity, min 0. Message: "PO Lines - Received Quantity must be greater than or equal to 0".)'
  R49: 'Receiving MORE than was ordered stays allowed, with no upper limit — 12 delivered against 10 ordered must keep working, because suppliers really do over-ship and refusing it would stop legitimate receiving. Only negatives are refused. This is a decision, not an oversight: an over-receipt tolerance or approval step was considered and deliberately left out (F1).' # This rule exists to stop a future session "tightening" R48 into a both-sided bound.
  R50: 'Every check that runs when a line is added must be able to find the order the line belongs to, no matter how the request names it, and must say in words what is wrong. That covers both the Completed-or-Closed block and the approved-amount ceiling. It makes no difference where the request came from — the PO screen, an import, or another program talking to the app directly — or how that request spelled out which order the line belongs to. A line that does not say which order it belongs to at all is refused too, rather than saved as a line hanging off no order. (D89. Found by testing: the guard used to take the order straight from the request as written. The PO screens write it one way and that worked; anything writing it the other way crashed the lookup, so instead of "you cannot add a line to a closed order" the caller got a server error page. Pat never saw it because the screens only ever write it the way that worked. The same fault was then found in the approved-amount check and fixed the same way.)'
  R42: The parent PO's Lines Total always ends up equal to the sum of its lines' line_total amounts. On create and on a change to quantity or unit price the recompute runs in the background, so the total catches up shortly after; it holds no matter how the line arrived — typed by hand, written by a workflow, or bulk-imported — because that recompute re-reads the line from the database instead of trusting the trigger payload, whose PO link is empty on import-created rows. On delete the recompute runs inline, so the total is already correct when the delete returns. (D83; create/update 1ugka88lngm, delete pnvp0dtitum.)

