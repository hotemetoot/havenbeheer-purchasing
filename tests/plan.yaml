# tests/plan.yaml — havenbeheer ACL test suite
# R1–R3 (purchase_requests / operations role) verified live 2026-07-02,
# 4/4 passed (see tests/reports/20260702-091759.md). No longer TODO.
#
# Retrofit pilot (nb-project-suite deliverable 6) is extending this suite
# with a full ACL/workflow audit, drafted rule by rule, group by group.
# New rules get # TODO verify until reviewed and run live.
#
# Checked for interference from request-interception guards on
# purchase_requests before drafting the update/destroy cases:
#   - "Guard A — PR Immutability Guard" blocks update/destroy only when
#     status is approved or rejected (verified live 2026-07-04, id
#     366217145548800). Its condition still lists `cancelled` too, but that is
#     a dead clause after D68 retired the status — no PR can reach it. It does
#     NOT block info_requested, so R2 (edit) and R3 (destroy-deny via ACL)
#     both reach ACL as intended.
#   - "Guard: PR Budget (create) — block over-project-budget" triggers on
#     create but only matters when a project is linked; fixtures below don't
#     set project/projectId, so it should be a no-op. Flag to Alexander if
#     the create case fails unexpectedly — that guard is the first suspect.

rules:
  R1: Operations users can create purchase requests.
  R2: Operations users can update their own purchase request only while its status is info_requested; they cannot update another operations user's purchase request. Ownership = the acting user is the PR's creator (createdById) or submitter (submitterId). (D68 retired draft; the only operations-editable status is now info_requested, reached by an approver returning the PR for info.)
  R3: Operations users cannot delete purchase requests.
  R4: Only procurement can create purchase orders; director cannot create one. Verified live 2026-07-04 — procurement holds a purchase_orders:create grant; director has no PO resource entry and its role strategy is view-only.
  R5: Only procurement can create po_lines; director cannot create one. Verified live 2026-07-04 — procurement holds a po_lines:create grant; director has no po_lines resource entry and its role strategy is view-only.
  R12: Director can update the render-enabler fields (rejection_comment, rejection_reason_category, signature) on a purchase request while it is at pending_director_approval (its own approval stage). Narrowed 2026-07-02 (D58) - project/projectId dropped from this grant, no longer part of the rule. Verified live 2026-07-04 — update scope "PR — pending director approval" = status $eq pending_director_approval; field whitelist is exactly those three, no project/projectId.
  R13: Director cannot update PR fields outside its own approval stage (pending_director_approval). Verified live 2026-07-04 — the director update grant's only scope is status $eq pending_director_approval, so any other status (here info_requested) falls outside it and is denied.
  R14: Director cannot create purchase requests. Verified live 2026-07-04 — director's purchase_requests grant has only view + update actions (no create), and its role strategy is view-only.
  R15: Procurement can create a purchase order from a purchase request whose status is approved (the allow counterpart to R16). Reviewed + verified live 2026-07-02.
  R16: 'Procurement cannot create a PO from a purchase request that is not approved. Verified live 2026-07-04 — "Guard: Create PO (PR must be approved)" (global on purchase_orders:create) blocks when the source PR''s status is not approved (also blocks if the PR already has a PO).'
  R17: Procurement can update a PO's header fields at any non-terminal status (draft/issued/partially_received/received) — the update ACL grant is unscoped and the PO Immutability guard blocks only the terminal statuses (completed/closed) — and cannot delete a PO at any status — procurement has no destroy grant on purchase_orders (D56/D59, ACL re-verified live 2026-07-04; D69 retired the sent/confirmed statuses).
  R20: Director, finance, and operations users cannot update or delete a purchase order — none has an independent grant, so they fall through to member's view-only baseline (D59).
  R18: Once a PO is terminal (completed/closed), no role — including procurement, which can edit a draft PO — can update it; the PO-immutability guard blocks it independent of ACL (D33).
  R21: Procurement can add and update po_lines on a non-terminal (draft) PO and can delete a line only while the PO is draft; once the PO is non-draft the line-destroy guard blocks deletion. A line create that would push the PO total over the source PR's quoted_total is blocked by the PO-line budget-ceiling guard (D47/D49).
  R22: Procurement records receiving by updating a po_line's received_quantity, allowed only once the PO is issued (receivable set = issued/partially_received/received) — the Receive guard blocks a received_quantity update while the PO is still draft. Director, finance, and operations users cannot record receiving at all (no update grant, member view-only baseline; receiving sits on procurement as a deliberate interim, D59). # D69 trimmed the guard's dead sent/confirmed clauses; verified live 2026-07-05
  R24: Director, finance, and operations users cannot update or delete po_lines — none has an independent grant, member view-only baseline (D59).
  # --- R15/R17-R24 drafted 2026-07-02 from the full purchase_orders/po_lines
  # ACL audit across all 5 roles (D59; audit begun in D56), business rules
  # approved by Alexander. R15/R19/R23 verified earlier; R17/R20/R21/R24
  # promoted 2026-07-03 (D61) against po_draft; R18 + R21's delete-deny added
  # 2026-07-03 against the po_closed fixture. R22 drafted 2026-07-03 (tenth
  # session) against the po_issued fixture — Issue PO is a one-click
  # custom-action workflow, fired via the dedicated purchase_orders:trigger
  # verb (verified live; see fixtures.actions below).
  R19: Finance and operations users cannot create a purchase order (no independent create grant; view-only via member baseline).
  R23: Finance and operations users cannot create po_lines (no independent create grant; view-only via member baseline).
  # --- R25-R30 drafted 2026-07-04 (twelfth session) from the projects
  # backend hardened in D63/D64 (guard 2h75zryz3cb, Complete Project
  # px2xvjaxoqf — "Close Project" pre-D67, D53 backstop) and the projects ACL re-verified live this
  # session. Business rules locked with Alexander 2026-07-03 (see HANDOFF /
  # D63); the rule TEXTS below are still unreviewed - the # TODO verify
  # markers gate the first run.
  R25: Only operations users can create projects; procurement, director, and finance cannot (no create grant — member view-only baseline).
  R26: Project edits are owner- and stage-scoped, never open to any operations user (ownership key = createdBy). The submitter can edit the content fields (title, budget_usd, description, justification, attachments) only while the project is draft or info_requested; no other operations user can edit a project they did not create. Once submitted, content edits happen only inside the approval flow — the department head can edit those same content fields, including budget_usd, while the project is at pending_dept_approval. The approval-metadata fields (rejection_comment, rejection_reason_category, approval_document) are editable only by the stage approver at that stage — procurement at pending_purchasing_review, director at pending_director_approval — and never outside it. remaining_usd (a formula) and committed_usd (maintained by the recompute workflow) are never directly writable by any role. rejected, approved, and completed projects are fully locked; a project advances only through the approval flow and is completed only via the Complete action (R27). No role can delete a project at any status. Admin is exempt throughout. # reviewed + approved by Alexander 2026-07-05 (eighteenth session); ran green same day. Dept-head content edit at pending_dept_approval waits on the approver-interface UI (Alexander) and has no runner case — manual check when that form is built
  R27: Only procurement can complete a project (dedicated Complete Project action; no other role has the trigger grant), and only an approved one — completing a draft, mid-flow, info_requested, or rejected project, or re-completing a completed one, is rejected. A successful completion sets status completed and stamps completed_at. # reviewed + approved by Alexander 2026-07-05 (eighteenth session); suite green same day, no role outside procurement holds the trigger grant (member/finance re-checked)
  R28: A purchase request cannot be created linked to a project whose status is anything other than approved — draft, any pending stage, info_requested, rejected, or the completed terminal all block; linking to an approved project is allowed. The same not-approved check also guards project re-links on PR update.
  R29: When procurement approves a project-linked PR, it is auto-rejected if the total of already-approved sibling PRs plus this PR exceeds the project's budget (strict greater-than — exactly on budget still approves); within budget it is approved, and the project's committed amount recomputes from approved PRs only.
  R30: A PR drawing on an approved project skips the director and board stages unconditionally — procurement approval is the final human step, regardless of amount.

fixtures:
  users:
    operations_a: { role: operations }
    operations_b: { role: operations }
    director_a: { role: director }
    procurement_a: { role: procurement }
    finance_a: { role: finance }
    pat_procurement: { existing: true, email: "pat@havenbeheer.test", password: "nbtest" }
    dana_director: { existing: true, email: "dana@havenbeheer.test", password: "nbtest" }
    # operations_proj: dept-bearing project submitter. The Project Approval
    # ladder routes its dept stage via createdBy.mainDepartment.mainApproverId
    # — a dept-less user stalls there (HANDOFF fixture note). main_department
    # points at the Procurement dept (363554444476416, main approver = Pat,
    # id 11) so the dept stage lands on known creds. Do NOT add a department
    # to the existing seeded users — it would change the already-green PR
    # approval chains above.
    operations_proj: { role: operations, main_department: 363554444476416 }

  records:
    purchase_requests:
      # pr_draft_a: created into the approval flow, then returned for info by
      # procurement (see fixtures.approvals) so it lands at info_requested —
      # the only status operations can edit after D68 retired `draft`. Name
      # kept; shared source PR for R2 (owner edit), R13 (not-director-stage),
      # R16 (not-approved).
      - id_ref: pr_draft_a
        as: operations_a
        trigger_workflow: cv237r8h7k9   # PR Approval workflow key
        values: { title: "[TEST] Office chairs", quoted_total: 100 }
      - id_ref: pr_pending_director
        as: operations_a
        trigger_workflow: cv237r8h7k9   # PR Approval workflow key
        values: { title: "[TEST] R12 fixture", quoted_total: 100 }
      - id_ref: pr_approved
        as: operations_a
        trigger_workflow: cv237r8h7k9   # PR Approval workflow key
        values: { title: "[TEST] R15 approved-PR fixture", quoted_total: 100 }
      # pr_approved_2: a SECOND approved PR, needed because PR->PO is 1:1,
      # enforced live by "Guard: Create PO (PR must be approved)" (id
      # 366562380808192): it blocks a PO create when the PR already has one
      # (purchase_request.purchase_order != null). R15's case consumes
      # pr_approved, so the po_draft fixture below needs its own source PR.
      - id_ref: pr_approved_2
        as: operations_a
        trigger_workflow: cv237r8h7k9   # PR Approval workflow key
        values: { title: "[TEST] po_draft fixture source PR", quoted_total: 100 }
      # pr_approved_3: source PR for the po_closed fixture (1:1 -> its own PR).
      - id_ref: pr_approved_3
        as: operations_a
        trigger_workflow: cv237r8h7k9   # PR Approval workflow key
        values: { title: "[TEST] po_closed fixture source PR", quoted_total: 100 }
      # pr_approved_4: source PR for the po_issued fixture (1:1 -> its own PR).
      - id_ref: pr_approved_4
        as: operations_a
        trigger_workflow: cv237r8h7k9   # PR Approval workflow key
        values: { title: "[TEST] po_issued fixture source PR", quoted_total: 100 }
      # --- drawdown PRs (R29/R30): linked to proj_approved, so they can only
      # be created AFTER the project's approval chain ran (create guard
      # lylobzvlh5p blocks linking a non-approved project) -> after_approvals.
      # Their own approval steps run in the SECOND approvals pass (entries
      # with after_records: true below). fx_rate_to_usd: 1 keeps
      # quoted_total_usd == quoted_total. Budget 5000: within (1000) commits;
      # over (9500; 1000 + 9500 > 5000) trips the D53 backstop at
      # procurement-approve. Both terminal PRs (approved/rejected) survive
      # teardown — Guard A blocks destroy on terminal PRs — so this adds 2
      # labeled debris PRs per run (accepted, same policy as pr_approved_*),
      # with dangling project FKs once the project fixture is deleted.
      - id_ref: pr_proj_within
        as: operations_a
        after_approvals: true
        trigger_workflow: cv237r8h7k9
        values: { title: "[TEST] project PR within budget", quoted_total: 1000, fx_rate_to_usd: 1, project: "@ref:proj_approved" }
      - id_ref: pr_proj_over
        as: operations_a
        after_approvals: true
        trigger_workflow: cv237r8h7k9
        values: { title: "[TEST] project PR over budget", quoted_total: 9500, fx_rate_to_usd: 1, project: "@ref:proj_approved" }

    # --- projects fixtures (R25-R30). status defaults to draft (field
    # defaultValue, verified live 2026-07-04); operations' create whitelist
    # has no status field, so none is sent. Budgets stay under the ladder's
    # $15k board threshold to keep chains at 3 steps (dept -> procurement ->
    # director). The immutability guard (2h75zryz3cb) exempts admin, so
    # teardown deletes ALL project fixtures cleanly; approvals rows
    # cascade-delete with the project (D63).
    projects:
      # proj_draft: plain create, stays draft. Used by R26 (draft edits +
      # destroy-deny), R27 (complete-draft deny), R28 (link-deny).
      - id_ref: proj_draft
        as: operations_a
        values: { title: "[TEST] draft project", budget_usd: 5000, justification: "[TEST] R26 draft fixture" }
      # proj_pending: enters the ladder and is deliberately left at the dept
      # stage (submitter operations_proj -> assignee Pat, never approved).
      # Gives R26 its mid-flow lock target. The zero-step approvals entry
      # below pins the precondition (status pending_dept_approval).
      - id_ref: proj_pending
        as: operations_proj
        trigger_workflow: hzykothf9cx   # Project Approval workflow key
        values: { title: "[TEST] mid-flow project", budget_usd: 5000, justification: "[TEST] R26 mid-flow fixture" }
      # proj_approved: full ladder to approved. The drawdown target for
      # R28/R29/R30's PRs, then R27's complete-allow target (case order:
      # the R28 link-allow case MUST run before the R27 complete-allow case).
      - id_ref: proj_approved
        as: operations_proj
        trigger_workflow: hzykothf9cx
        values: { title: "[TEST] approved project", budget_usd: 5000, justification: "[TEST] drawdown fixture" }
      # proj_approved_2: full ladder to approved, then fixtures.actions
      # completes it AS ADMIN before any case runs -> the stable `completed`
      # project for R26 (completed-update deny), R27 (re-complete deny), R28
      # (link-to-completed deny).
      - id_ref: proj_approved_2
        as: operations_proj
        trigger_workflow: hzykothf9cx
        values: { title: "[TEST] completed project", budget_usd: 5000, justification: "[TEST] completed fixture" }
      # proj_rejected: enters the ladder, dept stage REJECTS -> status
      # rejected. R26's rejected-locked deny target (D66: rejected is fully
      # locked — outside the owner-edit scope AND in the guard's locked list).
      - id_ref: proj_rejected
        as: operations_proj
        trigger_workflow: hzykothf9cx
        values: { title: "[TEST] rejected project", budget_usd: 5000, justification: "[TEST] R26 rejected fixture" }
      # proj_purchasing: enters the ladder, ONE dept approve -> stalled at
      # pending_purchasing_review. R26's guard-isolation target: procurement's
      # stage-scoped update grant passes ACL here, so a deny can only come
      # from the guard's pending clause (see the case comment).
      - id_ref: proj_purchasing
        as: operations_proj
        trigger_workflow: hzykothf9cx
        values: { title: "[TEST] purchasing-stage project", budget_usd: 5000, justification: "[TEST] R26 guard-isolation fixture" }

    # Reference data for the Issue PO guard: it requires supplierId and
    # deliveryAddressId to be set. Created as admin (plain reference records,
    # no guards on these collections, not the rule under test). Deletable at
    # teardown; the leftover issued PO (undeletable line, see below) keeps
    # dangling FKs afterward — harmless [TEST] debris, same policy as
    # po_closed.
    suppliers:
      - id_ref: sup_r22
        values: { name: "[TEST] R22 supplier" }
    delivery_addresses:
      - id_ref: addr_r22
        values: { name: "[TEST] R22 delivery address" }

    # po_draft: reusable non-terminal (draft) PO for R17/R20/R21 cases.
    # po_closed: a draft PO that fixtures.actions then drives to `closed` (a
    # terminal PO) for R18 + R21's delete-deny. Both after_approvals so the
    # runner creates them in the POST-approval pass — the create-guard
    # requires the source PR already `approved`.
    purchase_orders:
      - id_ref: po_draft
        as: procurement_a
        after_approvals: true
        values: { purchase_request: "@ref:pr_approved_2", currency: USD, total: 100 }
      - id_ref: po_closed
        as: procurement_a
        after_approvals: true
        values: { purchase_request: "@ref:pr_approved_3", currency: USD, total: 100 }
      # po_issued: seeded complete (supplier + delivery address + currency +
      # total) so the Issue PO guard passes; fixtures.actions below then
      # drives it draft -> issued. Both associations are in procurement's
      # create whitelist (confirmed live 2026-07-03).
      - id_ref: po_issued
        as: procurement_a
        after_approvals: true
        values: { purchase_request: "@ref:pr_approved_4", supplier: "@ref:sup_r22", delivery_address: "@ref:addr_r22", currency: USD, total: 100 }

    # Lines are created while the parent PO is still draft (line create on a
    # terminal PO is blocked by "Guard: PO Line Create — block on terminal
    # PO"), so po_closed's line must be seeded BEFORE fixtures.actions closes
    # it. line_total 50 < the PR's quoted_total 100 clears the budget guard.
    po_lines:
      - id_ref: po_draft_line
        as: procurement_a
        after_approvals: true
        values: { purchase_order: "@ref:po_draft", quantity_ordered: 2, unit_price: 25 }
      - id_ref: po_closed_line
        as: procurement_a
        after_approvals: true
        values: { purchase_order: "@ref:po_closed", quantity_ordered: 2, unit_price: 25 }
      # po_issued_line: seeded while the PO is still draft (line create on a
      # non-draft PO is guard-blocked). Priced (Issue guard rejects any
      # unpriced line) and 50 <= the PR's 100 (budget ceiling).
      - id_ref: po_issued_line
        as: procurement_a
        after_approvals: true
        values: { purchase_order: "@ref:po_issued", quantity_ordered: 2, unit_price: 25 }

  # Drives fixture PRs through the REAL PR Approval workflow. Real personas
  # required: approvalRecords:submit checks the actual assigned userId, not
  # just role membership. Assignees resolve from departments.main_approver
  # (D40): Procurement -> pat.procurement (id 11), Director -> dana.director
  # (id 12). Chain for a simple PR (no project, is_regular false, small
  # total) verified live against the enabled PR Approval workflow
  # (id 372610390622208): Procurement Approval -> "Director required?"
  # (is_regular != true) -> pending_director_approval -> Director Approval
  # -> "Board required?" false (< $15k) -> approved.
  approvals:
    # pr_draft_a: created into the flow (skips dept — test users carry no
    # department), lands at the procurement stage; procurement RETURNS it for
    # info. The Procurement Approval node's return branch (branchIndex 1) is
    # wired to "Procurement Returned → Info Requested", which sets
    # status=info_requested (verified live 2026-07-04). A plain return needs no
    # returnToNodeKey (node returnTo=null). This is the only way to reach the
    # one operations-editable status after D68 — operations cannot write status.
    - target: pr_draft_a
      steps:
        - as: pat_procurement
          decision: return
          comment: "[TEST] procurement returns for info -> info_requested"
      assert:
        - collection: purchase_requests
          id_ref: pr_draft_a
          match: { status: info_requested }
      timeout_s: 30
    # pr_pending_director: one step only (Procurement), lands at
    # pending_director_approval - the precondition for R12.
    - target: pr_pending_director
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve, advance to director stage"
      assert:
        - collection: purchase_requests
          id_ref: pr_pending_director
          match: { status: pending_director_approval }
      timeout_s: 30
    # pr_approved: full chain (Procurement + Director) to status: approved -
    # the precondition for R15 (procurement creates a PO from an approved PR).
    - target: pr_approved
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> director stage"
        - as: dana_director
          decision: approve
          comment: "[TEST] director approve -> approved"
      assert:
        - collection: purchase_requests
          id_ref: pr_approved
          match: { status: approved }
      timeout_s: 30
    # pr_approved_2: same full chain, source PR for the po_draft fixture.
    - target: pr_approved_2
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> director stage"
        - as: dana_director
          decision: approve
          comment: "[TEST] director approve -> approved"
      assert:
        - collection: purchase_requests
          id_ref: pr_approved_2
          match: { status: approved }
      timeout_s: 30
    # pr_approved_3: same full chain, source PR for the po_closed fixture.
    - target: pr_approved_3
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> director stage"
        - as: dana_director
          decision: approve
          comment: "[TEST] director approve -> approved"
      assert:
        - collection: purchase_requests
          id_ref: pr_approved_3
          match: { status: approved }
      timeout_s: 30
    # pr_approved_4: same full chain, source PR for the po_issued fixture.
    - target: pr_approved_4
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> director stage"
        - as: dana_director
          decision: approve
          comment: "[TEST] director approve -> approved"
      assert:
        - collection: purchase_requests
          id_ref: pr_approved_4
          match: { status: approved }
      timeout_s: 30

    # --- projects approval chains (R25-R30 preconditions). Ladder audited
    # node-by-node 2026-07-03: dept stage (assignee = submitter's
    # mainDepartment.mainApproverId = Pat via operations_proj) ->
    # Procurement Approval (Pat) -> Director Approval (Dana); board stage
    # skipped (budget 5000 < 15000). The guard 2h75zryz3cb is active
    # throughout — these chains PASSING is the approval-path pass-through
    # proof for R26 (approval writes bypass request-interception, D63).
    # departmentId assert: the first ladder node writes it from the
    # submitter's main department — resolves 363554444476416 for
    # operations_proj under BOTH the current revision and the pending
    # Rule C revision (373589018214400), so this does not block on the
    # revision swap.
    # proj_pending: zero steps — the entry only pins the precondition
    # (stalled at the dept stage) that R26's mid-flow deny case relies on.
    - target: proj_pending
      steps: []
      assert:
        - collection: projects
          id_ref: proj_pending
          match: { status: pending_dept_approval }
      timeout_s: 30
    - target: proj_approved
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] dept stage approve"
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement stage approve"
        - as: dana_director
          decision: approve
          comment: "[TEST] director stage approve -> approved"
      assert:
        - collection: projects
          id_ref: proj_approved
          match: { status: approved, departmentId: 363554444476416 }
      timeout_s: 30
    - target: proj_approved_2
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] dept stage approve"
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement stage approve"
        - as: dana_director
          decision: approve
          comment: "[TEST] director stage approve -> approved"
      assert:
        - collection: projects
          id_ref: proj_approved_2
          match: { status: approved }
      timeout_s: 30
    # proj_rejected: ONE dept-stage reject ends the ladder -> rejected.
    - target: proj_rejected
      steps:
        - as: pat_procurement
          decision: reject
          comment: "[TEST] dept stage reject -> rejected"
      assert:
        - collection: projects
          id_ref: proj_rejected
          match: { status: rejected }
      timeout_s: 30
    # proj_purchasing: ONE dept-stage approve -> stalled at purchasing review.
    - target: proj_purchasing
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] dept stage approve -> purchasing review"
      assert:
        - collection: projects
          id_ref: proj_purchasing
          match: { status: pending_purchasing_review }
      timeout_s: 30
    # --- drawdown PR chains: after_records -> run in the SECOND approvals
    # pass, after the after_approvals records above exist. ONE procurement
    # step each — for a project-linked PR the drawdown branch replaces the
    # director/board routing entirely (D49/D53): within-budget -> approved,
    # over-budget -> auto-rejected. Outcome asserts live in the R29/R30
    # `state` cases, where a failure is classified per rule.
    - target: pr_proj_within
      after_records: true
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> drawdown, within budget"
      timeout_s: 30
    - target: pr_proj_over
      after_records: true
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> drawdown, over budget"
      timeout_s: 30

  # fixtures.actions — fire a post-action / one-click workflow on a fixture
  # record once, up front (after records exist), via the triggerWorkflows
  # query param. Here: drive po_closed (a draft PO with a line) to `closed`
  # through the Close PO post-action (workflow key f8gpu17s6hq, type action).
  # Its guard allows closing a draft/issued/partially_received PO. Run as
  # admin so the update clears ACL/field-whitelist cleanly — the close is
  # fixture setup, not the rule under test. internal_notes is a harmless
  # payload just to carry the triggering update.
  actions:
    - target: po_closed
      as: admin
      action: purchase_orders:update
      trigger_workflows: f8gpu17s6hq
      values: { internal_notes: "[TEST] close trigger" }
      assert:
        - collection: purchase_orders
          id_ref: po_closed
          match: { status: closed }
      timeout_s: 30
    # Drive po_issued draft -> issued through Issue PO (key issue_po, type
    # custom-action, sync). Custom-action (one-click) workflows fire via the
    # DEDICATED `<collection>:trigger` verb — verified live 2026-07-03 —
    # not by riding triggerWorkflows on a CRUD verb like the post-action
    # close above. No values needed. Run as admin: setup, not the rule under
    # test. If the guard rejects, the runner surfaces the workflow's own
    # response-message (HTTP 400) — read it, it names the failed condition.
    - target: po_issued
      as: admin
      action: purchase_orders:trigger
      trigger_workflows: issue_po
      assert:
        - collection: purchase_orders
          id_ref: po_issued
          match: { status: issued }
      timeout_s: 30
    # Drive proj_approved_2 -> completed through Complete Project (key
    # px2xvjaxoqf, custom-action, sync) so cases start against a stable
    # completed project. As admin: setup, not the rule under test (the
    # complete workflow's own role check passes admin; status check passes:
    # approved). R27's own allow case completes proj_approved as procurement.
    - target: proj_approved_2
      as: admin
      action: projects:trigger
      trigger_workflows: px2xvjaxoqf
      assert:
        - collection: projects
          id_ref: proj_approved_2
          match: { status: completed }
      timeout_s: 30

cases:
  - rule: R1
    name: operations user can create a purchase request
    as: operations_a
    action: purchase_requests:create
    values: { title: "[TEST] New PR" }   # status omitted — defaults to pending_dept_approval (D68)
    expect: allow

  - rule: R2
    name: operations user can update their own info_requested PR
    as: operations_a
    action: purchase_requests:update
    target: pr_draft_a
    values: { title: "[TEST] Office chairs (edited)" }
    expect: allow

  - rule: R2
    name: operations user cannot update another operations user's info_requested PR
    as: operations_b
    action: purchase_requests:update
    target: pr_draft_a
    values: { title: "[TEST] hijacked" }
    expect: deny

  - rule: R3
    name: operations user cannot destroy a purchase request
    as: operations_a
    action: purchase_requests:destroy
    target: pr_draft_a
    expect: deny

  # --- R4/R5: only procurement has independent create config on these two
  # collections (D56); director/finance/member/operations all fall through
  # to member's view-only baseline, no create action registered at all —
  # confirmed via live ACL audit 2026-07-02. No PO fixture needed since ACL
  # denies create before any record/association is touched.
  - rule: R4
    name: director cannot create a purchase order
    as: director_a
    action: purchase_orders:create
    values: { currency: USD, total: 100 }
    expect: deny

  - rule: R5
    name: director cannot create a po_line
    as: director_a
    action: po_lines:create
    values: { quantity_ordered: 1 }
    expect: deny

  # --- R12: director's render-enabler update grant works at its own
  # approval stage (D55/D57/D58) — pr_pending_director is driven to
  # pending_director_approval via fixtures.approvals above.
  - rule: R12
    name: director can update PR fields while it's at its own approval stage (pending_director_approval)
    as: director_a
    action: purchase_requests:update
    target: pr_pending_director
    values: { rejection_comment: "[TEST] director comment at own stage" }
    expect: allow

  # --- R13: director's render-enabler update grant is scoped to its own
  # approval stage (D55 fix) — pr_draft_a is status=info_requested, not
  # pending_director_approval, so this must be denied.
  - rule: R13
    name: director cannot update PR fields while it's at info_requested (not their approval stage)
    as: director_a
    action: purchase_requests:update
    target: pr_draft_a
    values: { rejection_comment: "[TEST] should be blocked" }
    expect: deny

  # --- R14: regression test locking in the D55 fix (stray create action removed)
  - rule: R14
    name: director cannot create a purchase request
    as: director_a
    action: purchase_requests:create
    values: { title: "[TEST] director attempt" }   # status omitted (D68 retired draft); ACL denies create regardless
    expect: deny

  # --- R15: allow counterpart to R16. pr_approved is driven to status:
  # approved via fixtures.approvals above, so "Guard: Create PO (PR must be
  # approved)" lets this through. The PO created here is a case artifact,
  # not a fixture - it can't be reused by R17/R20/etc., which need their
  # own seeded PO record.
  - rule: R15
    name: procurement can create a PO from an approved PR
    as: procurement_a
    action: purchase_orders:create
    values: { purchase_request: "@ref:pr_approved", currency: USD, total: 100 }
    expect: allow

  # --- R16: "Guard: Create PO (PR must be approved)" rejects with HTTP 400
  # (not 401/403) - confirmed live 2026-07-02, see runner.py DENY_CODES.
  - rule: R16
    name: procurement cannot create a PO from a PR that is not approved
    as: procurement_a
    action: purchase_orders:create
    values: { purchase_request: "@ref:pr_draft_a", currency: USD, total: 100 }
    expect: deny

  # --- R19/R23: finance and operations have no independent create grant on
  # purchase_orders/po_lines (D59 audit) — they fall through to member's
  # view-only baseline, same as director in R4/R5. ACL denies create before
  # any record is touched, so no PO fixture is needed here.
  - rule: R19
    name: finance cannot create a purchase order
    as: finance_a
    action: purchase_orders:create
    values: { currency: USD, total: 100 }
    expect: deny

  - rule: R19
    name: operations cannot create a purchase order
    as: operations_a
    action: purchase_orders:create
    values: { currency: USD, total: 100 }
    expect: deny

  - rule: R23
    name: finance cannot create a po_line
    as: finance_a
    action: po_lines:create
    values: { quantity_ordered: 1 }
    expect: deny

  - rule: R23
    name: operations cannot create a po_line
    as: operations_a
    action: po_lines:create
    values: { quantity_ordered: 1 }
    expect: deny

  # --- R17: procurement can edit a draft PO's header (update grant + "PO
  # Immutability" guard only bites on completed/closed), but cannot delete a
  # PO — procurement has no destroy grant on purchase_orders (ACL denies).
  # internal_notes is in procurement's update whitelist and touches no guard.
  - rule: R17
    name: procurement can update a draft PO's header
    as: procurement_a
    action: purchase_orders:update
    target: po_draft
    values: { internal_notes: "[TEST] procurement header edit" }
    expect: allow

  - rule: R17
    name: procurement cannot delete a PO (no destroy grant)
    as: procurement_a
    action: purchase_orders:destroy
    target: po_draft
    expect: deny

  # --- R20: director/finance/operations have no independent grant on
  # purchase_orders -> member view-only baseline, so update/destroy deny.
  - rule: R20
    name: director cannot update a PO
    as: director_a
    action: purchase_orders:update
    target: po_draft
    values: { internal_notes: "[TEST] should be blocked" }
    expect: deny

  - rule: R20
    name: director cannot delete a PO
    as: director_a
    action: purchase_orders:destroy
    target: po_draft
    expect: deny

  - rule: R20
    name: finance cannot update a PO
    as: finance_a
    action: purchase_orders:update
    target: po_draft
    values: { internal_notes: "[TEST] should be blocked" }
    expect: deny

  - rule: R20
    name: operations cannot update a PO
    as: operations_a
    action: purchase_orders:update
    target: po_draft
    values: { internal_notes: "[TEST] should be blocked" }
    expect: deny

  # --- R21: procurement adds/updates po_lines on the draft po_draft. A small
  # line (10) keeps the PO total (existing 50 + 10 = 60) under the PR's 100.
  # Updating only `description` skips the budget guard (no price/qty in values).
  # An over-budget create (100 x 10 = 1000) trips "Guard: PO Line Create —
  # budget ceiling" -> HTTP 400 deny.
  - rule: R21
    name: procurement can add a within-budget line to a draft PO
    as: procurement_a
    action: po_lines:create
    values: { purchase_order: "@ref:po_draft", description: "[TEST] extra line", quantity_ordered: 1, unit_price: 10 }
    expect: allow

  - rule: R21
    name: procurement can update a line's description on a draft PO
    as: procurement_a
    action: po_lines:update
    target: po_draft_line
    values: { description: "[TEST] line edited by procurement" }
    expect: allow

  - rule: R21
    name: procurement cannot add a line that pushes the PO over the PR budget
    as: procurement_a
    action: po_lines:create
    values: { purchase_order: "@ref:po_draft", description: "[TEST] over budget", quantity_ordered: 100, unit_price: 10 }
    expect: deny

  # --- R24: director/finance/operations have no independent grant on po_lines
  # -> member view-only baseline, so update/destroy deny (ACL bites before any
  # guard). Setting only `description` avoids the receive/budget guards, so a
  # non-deny result would be a real ACL leak, not a guard artifact.
  - rule: R24
    name: director cannot update a po_line
    as: director_a
    action: po_lines:update
    target: po_draft_line
    values: { description: "[TEST] should be blocked" }
    expect: deny

  - rule: R24
    name: director cannot delete a po_line
    as: director_a
    action: po_lines:destroy
    target: po_draft_line
    expect: deny

  - rule: R24
    name: finance cannot update a po_line
    as: finance_a
    action: po_lines:update
    target: po_draft_line
    values: { description: "[TEST] should be blocked" }
    expect: deny

  - rule: R24
    name: operations cannot update a po_line
    as: operations_a
    action: po_lines:update
    target: po_draft_line
    values: { description: "[TEST] should be blocked" }
    expect: deny

  # --- R18: po_closed is driven to `closed` by fixtures.actions. Procurement
  # can edit a DRAFT PO's header (R17), so a deny here isolates the "PO
  # Immutability" guard (blocks update on completed/closed) from ACL.
  - rule: R18
    name: procurement cannot update a closed (terminal) PO
    as: procurement_a
    action: purchase_orders:update
    target: po_closed
    values: { internal_notes: "[TEST] should be blocked (terminal)" }
    expect: deny

  # --- R21 delete-deny: procurement HAS destroy on po_lines and can delete a
  # line while the PO is draft, so a deny on po_closed_line (parent closed)
  # isolates "Guard: PO Line Destroy — block once PO issued" from ACL.
  - rule: R21
    name: procurement cannot delete a line once the PO is no longer draft
    as: procurement_a
    action: po_lines:destroy
    target: po_closed_line
    expect: deny

  # --- R22: receiving. po_issued is driven to `issued` by fixtures.actions.
  # Three guards fire on po_lines update; checked all three node chains live
  # 2026-07-03 before drafting:
  #   - "Guard: Receive" blocks a received_quantity update unless the parent
  #     PO is in the receivable set issued/partially_received/received (D69
  #     trimmed the dead sent/confirmed clauses) — so the po_draft_line case
  #     isolates it.
  #   - "Guard: PO Line Update — budget ceiling" only fires when values carry
  #     quantity_ordered/unit_price — a received_quantity-only update skips it.
  #   - "Guard: PO Line Immutability" only bites on completed/closed — issued
  #     passes.
  # received_quantity is in procurement's po_lines update whitelist (D59,
  # re-confirmed live 2026-07-03); operations has no update grant at all, so
  # its deny isolates ACL, not a guard.
  - rule: R22
    name: procurement can record receiving on a line of an issued PO
    as: procurement_a
    action: po_lines:update
    target: po_issued_line
    values: { received_quantity: 1 }
    expect: allow

  - rule: R22
    name: procurement cannot record receiving while the PO is still draft
    as: procurement_a
    action: po_lines:update
    target: po_draft_line
    values: { received_quantity: 1 }
    expect: deny

  - rule: R22
    name: operations cannot record receiving at all
    as: operations_a
    action: po_lines:update
    target: po_issued_line
    values: { received_quantity: 5 }
    expect: deny

  # ==========================================================================
  # R25-R30: projects. All tagged [projects] for scoped first runs
  # (--tag projects). Guard interference checked before drafting
  # (2026-07-04): "Guard: Project Immutability" (2h75zryz3cb, sync 400)
  # bites update/destroy when status is any pending_*, approved, or completed —
  # deny cases against those statuses isolate the GUARD; the draft-status
  # allow cases isolate ACL. Destroy-deny isolates ACL (no role has destroy
  # at any status). Complete denies: 403 = ACL (no trigger grant), 400 = the
  # complete workflow's own status/role End-nodes.
  # ORDER SENSITIVE: the R28 link-allow case and the R29/R30 state cases
  # must run BEFORE R27's complete-allow case turns proj_approved `completed`
  # (committed_usd is unaffected by completion, but the link-allow would
  # false-fail). Keep the R27 block last.
  # ==========================================================================

  # --- R25: only operations has create on projects (ACL audit 2026-07-04).
  - rule: R25
    name: operations user can create a project
    as: operations_a
    action: projects:create
    values: { title: "[TEST] R25 project", budget_usd: 100, justification: "[TEST] R25" }
    expect: allow
    tags: [projects]

  - rule: R25
    name: procurement cannot create a project
    as: procurement_a
    action: projects:create
    values: { title: "[TEST] R25 blocked", budget_usd: 100 }
    expect: deny
    tags: [projects]

  - rule: R25
    name: director cannot create a project
    as: director_a
    action: projects:create
    values: { title: "[TEST] R25 blocked", budget_usd: 100 }
    expect: deny
    tags: [projects]

  - rule: R25
    name: finance cannot create a project
    as: finance_a
    action: projects:create
    values: { title: "[TEST] R25 blocked", budget_usd: 100 }
    expect: deny
    tags: [projects]

  # --- R26 (D66 built 2026-07-05): operations update is scoped own AND
  # status in (draft, info_requested), content fields only; procurement/
  # director updates are stage-scoped render-enablers; the guard's locked
  # list now includes rejected. Non-draft/info denies hit the ACL scope
  # first — the guard is the backstop layer behind it (and the only layer
  # for admin-exempt paths). Dept-head content edit at pending_dept_approval
  # is an approver-interface mechanism (editable fields on the Dept Owner
  # Approval node): UI not built yet and the runner's approvals steps carry
  # no content edits, so it has NO case here — manual check when Alexander
  # builds the form.
  - rule: R26
    name: owner can edit their own draft project (content fields)
    as: operations_a
    action: projects:update
    target: proj_draft
    values: { title: "[TEST] draft project (edited)" }
    expect: allow
    tags: [projects]

  - rule: R26
    name: another operations user cannot edit someone else's draft project (ownership scope)
    as: operations_b
    action: projects:update
    target: proj_draft
    values: { title: "[TEST] should be blocked (not owner)" }
    expect: deny
    tags: [projects]

  # remaining_usd is not in any update whitelist: the app silently ignores
  # it (no 403). The runner's update-deny check is "the sent values were
  # NOT applied", which is exactly the intent here — this case fails only
  # if a whitelist change ever lets the value through. (First-run lesson:
  # an `expect: allow` carrying an ignored field fails the runner's
  # applied-values check — don't mix writable and ignored fields.)
  - rule: R26
    name: owner cannot write remaining_usd directly (field is ignored)
    as: operations_a
    action: projects:update
    target: proj_draft
    values: { remaining_usd: 999 }
    expect: deny
    tags: [projects]

  - rule: R26
    name: owner cannot edit a mid-flow project (pending dept approval)
    as: operations_proj
    action: projects:update
    target: proj_pending
    values: { title: "[TEST] should be blocked" }
    expect: deny
    tags: [projects]

  - rule: R26
    name: owner cannot edit an approved project
    as: operations_proj
    action: projects:update
    target: proj_approved
    values: { title: "[TEST] should be blocked" }
    expect: deny
    tags: [projects]

  - rule: R26
    name: owner cannot edit a rejected project (rejected is locked)
    as: operations_proj
    action: projects:update
    target: proj_rejected
    values: { title: "[TEST] should be blocked" }
    expect: deny
    tags: [projects]

  # procurement's update grant is now scoped to pending_purchasing_review,
  # so this deny hits the ACL scope; the guard's completed clause backstops.
  - rule: R26
    name: procurement cannot edit a completed project
    as: procurement_a
    action: projects:update
    target: proj_approved_2
    values: { rejection_comment: "[TEST] should be blocked" }
    expect: deny
    tags: [projects]

  # Guard isolation: procurement's stage scope MATCHES here (ACL passes),
  # so this deny can only come from the guard's pending_purchasing_review
  # clause (sync request-interception, HTTP 400). Every other R26 deny hits
  # an ACL scope before the guard. Proves the stage grants are render-
  # enablers — direct API writes at a pending stage are blocked; real
  # metadata edits ride the approval interface, which bypasses the guard
  # (D63). One representative case: director's grant is the same mechanism.
  - rule: R26
    name: procurement cannot directly edit a project even at its own stage (guard blocks; edits ride the approval interface)
    as: procurement_a
    action: projects:update
    target: proj_purchasing
    values: { rejection_comment: "[TEST] should be blocked by the guard" }
    expect: deny
    tags: [projects]

  - rule: R26
    name: operations cannot delete a project (even a draft)
    as: operations_a
    action: projects:destroy
    target: proj_draft
    expect: deny
    tags: [projects]

  # --- R28: create guard lylobzvlh5p blocks linking a non-approved project
  # (HTTP 400). The allow side must run while proj_approved is still open —
  # BEFORE R27's complete-allow below. The allow-case PR stays draft (no
  # quote), so it never enters committed_usd and teardown can delete it.
  - rule: R28
    name: PR cannot be created linked to a draft project
    as: operations_a
    action: purchase_requests:create
    values: { title: "[TEST] R28 blocked", project: "@ref:proj_draft" }
    expect: deny
    tags: [projects]

  - rule: R28
    name: PR cannot be created linked to a completed project
    as: operations_a
    action: purchase_requests:create
    values: { title: "[TEST] R28 blocked", project: "@ref:proj_approved_2" }
    expect: deny
    tags: [projects]

  - rule: R28
    name: PR can be created linked to an approved project
    as: operations_a
    action: purchase_requests:create
    values: { title: "[TEST] R28 allowed", project: "@ref:proj_approved" }
    expect: allow
    tags: [projects]

  # --- R29: outcomes of the drawdown chains driven in fixtures.approvals
  # (after_records pass). state cases: polled subset-match, admin read.
  - rule: R29
    name: over-budget project PR was auto-rejected at procurement approve
    type: state
    target: pr_proj_over
    match: { status: rejected }
    tags: [projects]

  - rule: R29
    name: within-budget project PR was approved
    type: state
    target: pr_proj_within
    match: { status: approved }
    tags: [projects]

  - rule: R29
    name: project committed_usd recomputed from approved PRs only (1000, not 10500)
    type: state
    target: proj_approved
    match: { committed_usd: 1000 }
    tags: [projects]

  # --- R30: the within-budget PR reached `approved` off ONE procurement
  # decision (its fixture chain has a single step, no director/board) —
  # that is the unconditional director-skip. If the skip regressed, the PR
  # would sit at pending_director_approval and this match fails.
  - rule: R30
    name: project PR reached approved with procurement as the final human step
    type: state
    target: pr_proj_within
    match: { status: approved }
    tags: [projects]

  # --- R27: complete action. KEEP LAST (the allow case completes proj_approved).
  - rule: R27
    name: operations cannot fire the complete action (no trigger grant)
    as: operations_a
    action: projects:trigger
    target: proj_approved
    trigger_workflows: px2xvjaxoqf
    expect: deny
    tags: [projects]

  - rule: R27
    name: a draft project cannot be completed
    as: procurement_a
    action: projects:trigger
    target: proj_draft
    trigger_workflows: px2xvjaxoqf
    expect: deny
    tags: [projects]

  - rule: R27
    name: a completed project cannot be completed again
    as: procurement_a
    action: projects:trigger
    target: proj_approved_2
    trigger_workflows: px2xvjaxoqf
    expect: deny
    tags: [projects]

  - rule: R27
    name: procurement can complete an approved project
    as: procurement_a
    action: projects:trigger
    target: proj_approved
    trigger_workflows: px2xvjaxoqf
    expect: allow
    tags: [projects]

  - rule: R27
    name: the completed project actually reached status completed
    type: state
    target: proj_approved
    match: { status: completed }
    tags: [projects]

teardown:
  sweep_collections: []
  # Two async workflows also trigger on purchase_requests create/update
  # ("Project Commit: recompute", "Guard A" above is sync). Since fixtures
  # here don't link a project, they should no-op. Watch for leftovers on
  # first run and add to sweep_collections if any turn up.
