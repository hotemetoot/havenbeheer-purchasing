# tests/plan.yaml — havenbeheer ACL test suite
# R1–R3 (purchase_requests / operations role) verified live 2026-07-02,
# 4/4 passed (see tests/reports/20260702-091759.md). No longer TODO.
#
# Retrofit pilot (nb-project-suite deliverable 6) is extending this suite
# with a full ACL/workflow audit, drafted rule by rule, group by group.
# New rules get # TODO verify until reviewed and run live.
#
# Checked for interference from request-interception guards on
# purchase_requests before drafting the update/destroy cases:
#   - "Guard A — PR Immutability Guard" blocks update/destroy only when
#     status is approved/rejected/cancelled — does not affect draft, so R2/R3
#     below are clear.
#   - "Guard: PR Budget (create) — block over-project-budget" triggers on
#     create but only matters when a project is linked; fixtures below don't
#     set project/projectId, so it should be a no-op. Flag to Alexander if
#     the create case fails unexpectedly — that guard is the first suspect.

rules:
  R1: Operations users can create purchase requests.
  R2: Operations users can update their own purchase request while its status is draft or info_requested, and cannot update another operations user's purchase request.
  R3: Operations users cannot delete purchase requests.
  R4: Only procurement can create purchase orders; director cannot create one. # TODO verify
  R5: Only procurement can create po_lines; director cannot create one. # TODO verify
  R12: Director can update the render-enabler fields (rejection_comment, rejection_reason_category, signature) on a purchase request while it is at pending_director_approval (its own approval stage). Narrowed 2026-07-02 (D58) - project/projectId dropped from this grant, no longer part of the rule. # TODO verify
  R13: Director cannot update PR fields outside its own approval stage (pending_director_approval). # TODO verify
  R14: Director cannot create purchase requests. # TODO verify
  R15: Procurement can create a purchase order from a purchase request whose status is approved (the allow counterpart to R16). Reviewed + verified live 2026-07-02.
  R16: Procurement cannot create a PO from a purchase request that is not approved. # TODO verify
  R17: Procurement can update a non-terminal (draft) PO's header fields, and cannot delete a PO at any status — procurement has no destroy grant on purchase_orders (D56/D59, ACL confirmed live 2026-07-03). # TODO verify
  R20: Director, finance, and operations users cannot update or delete a purchase order — none has an independent grant, so they fall through to member's view-only baseline (D59). # TODO verify
  R21: Procurement can add and update po_lines on a non-terminal (draft) PO; a line create that would push the PO total over the source PR's quoted_total is blocked by the PO-line budget-ceiling guard (D47/D49). The delete-only-while-PO-draft half (D56) is deferred — it needs an issued/terminal PO fixture. # TODO verify
  R24: Director, finance, and operations users cannot update or delete po_lines — none has an independent grant, member view-only baseline (D59). # TODO verify
  # --- R15/R17-R24 drafted 2026-07-02 from the full purchase_orders/po_lines
  # ACL audit across all 5 roles (D59; audit begun in D56), business rules
  # approved by Alexander. R15/R19/R23 verified earlier; R17/R20/R21/R24
  # promoted 2026-07-03 (D61) against the draft po_draft fixture. Still held
  # here — each needs an ISSUED or TERMINAL (completed/closed) PO fixture that
  # doesn't exist yet, because their guards only act on a non-draft PO:
  #   R18: No role, incl. procurement, can update or delete a PO once completed/closed ("Guard: PO Immutability", D33). [terminal-PO fixture]
  #   R22: Procurement records receiving — po_lines.received_quantity update; "Guard: Receive" requires the PO be issued/sent/confirmed, so unreachable on a draft PO (D59). [issued-PO fixture]
  #   R21 delete-deny: line delete blocked once PO not draft ("Guard: PO Line Destroy — block once PO issued"). [issued-PO fixture]
  R19: Finance and operations users cannot create a purchase order (no independent create grant; view-only via member baseline). # TODO verify
  R23: Finance and operations users cannot create po_lines (no independent create grant; view-only via member baseline). # TODO verify

fixtures:
  users:
    operations_a: { role: operations }
    operations_b: { role: operations }
    director_a: { role: director }
    procurement_a: { role: procurement }
    finance_a: { role: finance }
    pat_procurement: { existing: true, email: "pat@havenbeheer.test", password: "nbtest" }
    dana_director: { existing: true, email: "dana@havenbeheer.test", password: "nbtest" }

  records:
    purchase_requests:
      - id_ref: pr_draft_a
        as: operations_a
        values: { title: "[TEST] Office chairs", status: draft }
      - id_ref: pr_pending_director
        as: operations_a
        trigger_workflow: cv237r8h7k9   # PR Approval workflow key
        values: { title: "[TEST] R12 fixture", quoted_total: 100 }
      - id_ref: pr_approved
        as: operations_a
        trigger_workflow: cv237r8h7k9   # PR Approval workflow key
        values: { title: "[TEST] R15 approved-PR fixture", quoted_total: 100 }
      # pr_approved_2: a SECOND approved PR, needed because PR->PO is 1:1,
      # enforced live by "Guard: Create PO (PR must be approved)" (id
      # 366562380808192): it blocks a PO create when the PR already has one
      # (purchase_request.purchase_order != null). R15's case consumes
      # pr_approved, so the po_draft fixture below needs its own source PR.
      - id_ref: pr_approved_2
        as: operations_a
        trigger_workflow: cv237r8h7k9   # PR Approval workflow key
        values: { title: "[TEST] po_draft fixture source PR", quoted_total: 100 }

    # po_draft: reusable non-terminal (draft) PO for R17/R20/R21/R22 cases.
    # Created as procurement_a from the approved pr_approved_2. Flagged
    # after_approvals so the runner creates it in the POST-approval pass —
    # the create-guard requires its source PR already `approved`.
    purchase_orders:
      - id_ref: po_draft
        as: procurement_a
        after_approvals: true
        values: { purchase_request: "@ref:pr_approved_2", currency: USD, total: 100 }

    # One line on po_draft. line_total = quantity_ordered * unit_price = 50,
    # under pr_approved_2's quoted_total (100), so "Guard: PO Line Create —
    # budget ceiling (PR amount)" (id 370018742763520) lets it through. PO
    # is draft, so "Guard: PO Line Create — block on terminal PO" is a no-op.
    # after_approvals so it lands in the post pass, after po_draft exists.
    po_lines:
      - id_ref: po_draft_line
        as: procurement_a
        after_approvals: true
        values: { purchase_order: "@ref:po_draft", quantity_ordered: 2, unit_price: 25 }

  # Drives fixture PRs through the REAL PR Approval workflow. Real personas
  # required: approvalRecords:submit checks the actual assigned userId, not
  # just role membership. Assignees resolve from departments.main_approver
  # (D40): Procurement -> pat.procurement (id 11), Director -> dana.director
  # (id 12). Chain for a simple PR (no project, is_regular false, small
  # total) verified live against the enabled PR Approval workflow
  # (id 372610390622208): Procurement Approval -> "Director required?"
  # (is_regular != true) -> pending_director_approval -> Director Approval
  # -> "Board required?" false (< $15k) -> approved.
  approvals:
    # pr_pending_director: one step only (Procurement), lands at
    # pending_director_approval - the precondition for R12.
    - target: pr_pending_director
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve, advance to director stage"
      assert:
        - collection: purchase_requests
          id_ref: pr_pending_director
          match: { status: pending_director_approval }
      timeout_s: 30
    # pr_approved: full chain (Procurement + Director) to status: approved -
    # the precondition for R15 (procurement creates a PO from an approved PR).
    - target: pr_approved
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> director stage"
        - as: dana_director
          decision: approve
          comment: "[TEST] director approve -> approved"
      assert:
        - collection: purchase_requests
          id_ref: pr_approved
          match: { status: approved }
      timeout_s: 30
    # pr_approved_2: same full chain, source PR for the po_draft fixture.
    - target: pr_approved_2
      steps:
        - as: pat_procurement
          decision: approve
          comment: "[TEST] procurement approve -> director stage"
        - as: dana_director
          decision: approve
          comment: "[TEST] director approve -> approved"
      assert:
        - collection: purchase_requests
          id_ref: pr_approved_2
          match: { status: approved }
      timeout_s: 30

cases:
  - rule: R1
    name: operations user can create a purchase request
    as: operations_a
    action: purchase_requests:create
    values: { title: "[TEST] New PR", status: draft }
    expect: allow

  - rule: R2
    name: operations user can update their own draft PR
    as: operations_a
    action: purchase_requests:update
    target: pr_draft_a
    values: { title: "[TEST] Office chairs (edited)" }
    expect: allow

  - rule: R2
    name: operations user cannot update another operations user's draft PR
    as: operations_b
    action: purchase_requests:update
    target: pr_draft_a
    values: { title: "[TEST] hijacked" }
    expect: deny

  - rule: R3
    name: operations user cannot destroy a purchase request
    as: operations_a
    action: purchase_requests:destroy
    target: pr_draft_a
    expect: deny

  # --- R4/R5: only procurement has independent create config on these two
  # collections (D56); director/finance/member/operations all fall through
  # to member's view-only baseline, no create action registered at all —
  # confirmed via live ACL audit 2026-07-02. No PO fixture needed since ACL
  # denies create before any record/association is touched.
  - rule: R4
    name: director cannot create a purchase order
    as: director_a
    action: purchase_orders:create
    values: { currency: USD, total: 100 }
    expect: deny

  - rule: R5
    name: director cannot create a po_line
    as: director_a
    action: po_lines:create
    values: { quantity_ordered: 1 }
    expect: deny

  # --- R12: director's render-enabler update grant works at its own
  # approval stage (D55/D57/D58) — pr_pending_director is driven to
  # pending_director_approval via fixtures.approvals above.
  - rule: R12
    name: director can update PR fields while it's at its own approval stage (pending_director_approval)
    as: director_a
    action: purchase_requests:update
    target: pr_pending_director
    values: { rejection_comment: "[TEST] director comment at own stage" }
    expect: allow

  # --- R13: director's render-enabler update grant is scoped to its own
  # approval stage (D55 fix) — pr_draft_a is status=draft, not
  # pending_director_approval, so this must be denied.
  - rule: R13
    name: director cannot update PR fields while it's still draft (not their approval stage)
    as: director_a
    action: purchase_requests:update
    target: pr_draft_a
    values: { rejection_comment: "[TEST] should be blocked" }
    expect: deny

  # --- R14: regression test locking in the D55 fix (stray create action removed)
  - rule: R14
    name: director cannot create a purchase request
    as: director_a
    action: purchase_requests:create
    values: { title: "[TEST] director attempt", status: draft }
    expect: deny

  # --- R15: allow counterpart to R16. pr_approved is driven to status:
  # approved via fixtures.approvals above, so "Guard: Create PO (PR must be
  # approved)" lets this through. The PO created here is a case artifact,
  # not a fixture - it can't be reused by R17/R20/etc., which need their
  # own seeded PO record.
  - rule: R15
    name: procurement can create a PO from an approved PR
    as: procurement_a
    action: purchase_orders:create
    values: { purchase_request: "@ref:pr_approved", currency: USD, total: 100 }
    expect: allow

  # --- R16: "Guard: Create PO (PR must be approved)" rejects with HTTP 400
  # (not 401/403) - confirmed live 2026-07-02, see runner.py DENY_CODES.
  - rule: R16
    name: procurement cannot create a PO from a PR that is not approved
    as: procurement_a
    action: purchase_orders:create
    values: { purchase_request: "@ref:pr_draft_a", currency: USD, total: 100 }
    expect: deny

  # --- R19/R23: finance and operations have no independent create grant on
  # purchase_orders/po_lines (D59 audit) — they fall through to member's
  # view-only baseline, same as director in R4/R5. ACL denies create before
  # any record is touched, so no PO fixture is needed here.
  - rule: R19
    name: finance cannot create a purchase order
    as: finance_a
    action: purchase_orders:create
    values: { currency: USD, total: 100 }
    expect: deny

  - rule: R19
    name: operations cannot create a purchase order
    as: operations_a
    action: purchase_orders:create
    values: { currency: USD, total: 100 }
    expect: deny

  - rule: R23
    name: finance cannot create a po_line
    as: finance_a
    action: po_lines:create
    values: { quantity_ordered: 1 }
    expect: deny

  - rule: R23
    name: operations cannot create a po_line
    as: operations_a
    action: po_lines:create
    values: { quantity_ordered: 1 }
    expect: deny

  # --- R17: procurement can edit a draft PO's header (update grant + "PO
  # Immutability" guard only bites on completed/closed), but cannot delete a
  # PO — procurement has no destroy grant on purchase_orders (ACL denies).
  # internal_notes is in procurement's update whitelist and touches no guard.
  - rule: R17
    name: procurement can update a draft PO's header
    as: procurement_a
    action: purchase_orders:update
    target: po_draft
    values: { internal_notes: "[TEST] procurement header edit" }
    expect: allow

  - rule: R17
    name: procurement cannot delete a PO (no destroy grant)
    as: procurement_a
    action: purchase_orders:destroy
    target: po_draft
    expect: deny

  # --- R20: director/finance/operations have no independent grant on
  # purchase_orders -> member view-only baseline, so update/destroy deny.
  - rule: R20
    name: director cannot update a PO
    as: director_a
    action: purchase_orders:update
    target: po_draft
    values: { internal_notes: "[TEST] should be blocked" }
    expect: deny

  - rule: R20
    name: director cannot delete a PO
    as: director_a
    action: purchase_orders:destroy
    target: po_draft
    expect: deny

  - rule: R20
    name: finance cannot update a PO
    as: finance_a
    action: purchase_orders:update
    target: po_draft
    values: { internal_notes: "[TEST] should be blocked" }
    expect: deny

  - rule: R20
    name: operations cannot update a PO
    as: operations_a
    action: purchase_orders:update
    target: po_draft
    values: { internal_notes: "[TEST] should be blocked" }
    expect: deny

  # --- R21: procurement adds/updates po_lines on the draft po_draft. A small
  # line (10) keeps the PO total (existing 50 + 10 = 60) under the PR's 100.
  # Updating only `description` skips the budget guard (no price/qty in values).
  # An over-budget create (100 x 10 = 1000) trips "Guard: PO Line Create —
  # budget ceiling" -> HTTP 400 deny.
  - rule: R21
    name: procurement can add a within-budget line to a draft PO
    as: procurement_a
    action: po_lines:create
    values: { purchase_order: "@ref:po_draft", description: "[TEST] extra line", quantity_ordered: 1, unit_price: 10 }
    expect: allow

  - rule: R21
    name: procurement can update a line's description on a draft PO
    as: procurement_a
    action: po_lines:update
    target: po_draft_line
    values: { description: "[TEST] line edited by procurement" }
    expect: allow

  - rule: R21
    name: procurement cannot add a line that pushes the PO over the PR budget
    as: procurement_a
    action: po_lines:create
    values: { purchase_order: "@ref:po_draft", description: "[TEST] over budget", quantity_ordered: 100, unit_price: 10 }
    expect: deny

  # --- R24: director/finance/operations have no independent grant on po_lines
  # -> member view-only baseline, so update/destroy deny (ACL bites before any
  # guard). Setting only `description` avoids the receive/budget guards, so a
  # non-deny result would be a real ACL leak, not a guard artifact.
  - rule: R24
    name: director cannot update a po_line
    as: director_a
    action: po_lines:update
    target: po_draft_line
    values: { description: "[TEST] should be blocked" }
    expect: deny

  - rule: R24
    name: director cannot delete a po_line
    as: director_a
    action: po_lines:destroy
    target: po_draft_line
    expect: deny

  - rule: R24
    name: finance cannot update a po_line
    as: finance_a
    action: po_lines:update
    target: po_draft_line
    values: { description: "[TEST] should be blocked" }
    expect: deny

  - rule: R24
    name: operations cannot update a po_line
    as: operations_a
    action: po_lines:update
    target: po_draft_line
    values: { description: "[TEST] should be blocked" }
    expect: deny

teardown:
  sweep_collections: []
  # Two async workflows also trigger on purchase_requests create/update
  # ("Project Commit: recompute", "Guard A" above is sync). Since fixtures
  # here don't link a project, they should no-op. Watch for leftovers on
  # first run and add to sweep_collections if any turn up.
